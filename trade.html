<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trade | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body { font-family:'Roboto',sans-serif; margin:0; background:#f8f9fa; padding-bottom:60px; }
header { background:#1a1a2e; color:#fff; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:10; }
header h1 { margin:0; font-size:20px; }
#menuBtn { background:#4b49ac; color:#fff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:500; }
#sideMenu { position:fixed; top:0; right:-300px; width:280px; height:100%; background:#fff; box-shadow:-2px 0 6px rgba(0,0,0,0.2); transition:right .3s; z-index:100; padding:20px; }
#sideMenu.active { right:0; }
#sideMenu a { display:block; margin:15px 0; color:#1a1a2e; text-decoration:none; font-weight:500; }
#closeMenu { background:#e74c3c; color:#fff; border:none; padding:8px 12px; cursor:pointer; border-radius:5px; margin-bottom:15px; }
.container{ padding:20px; }
.card { background:#fff; padding:25px; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.1); margin-bottom:20px; }
.input-group { margin-bottom:15px; }
.input-group label { display:block; margin-bottom:5px; font-weight:500; }
.input-group input, .input-group select { width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; }
button { padding:10px 20px; background:#4b49ac; color:#fff; border:none; border-radius:5px; cursor:pointer; font-weight:500; }
button:hover { background:#3a3690; }
.table-container { max-height:200px; overflow-y:auto; margin-top:20px; }
table { width:100%; border-collapse:collapse; }
th,td { padding:10px; text-align:left; }
th { background:#1a1a2e; color:#fff; }
tr:nth-child(even){ background:#f1f1f1; }
.bottom-nav { position:fixed; bottom:0; width:100%; background:#1a1a2e; display:flex; justify-content:space-around; padding:10px 0; }
.bottom-nav a { color:#fff; text-decoration:none; font-size:14px; }
.bottom-nav a.active { color:#4b49ac; }
</style>
</head>
<body>

<header>
  <h1>Trade</h1>
  <button id="menuBtn">Menu</button>
</header>

<div id="sideMenu">
  <button id="closeMenu">Close</button>
  <h2>Menu</h2>
  <a href="profile.html">Profile</a>
  <a href="kyc.html">KYC</a>
  <a href="changepassword.html">Change Password</a>
  <a href="2fa.html">2FA Settings</a>
  <a href="fee.html">Fees</a>
  <a href="referral.html">Referral</a>
  <button style="width:100%;margin-top:20px;padding:10px;background:#e74c3c;color:#fff;border:none;border-radius:5px;cursor:pointer;" onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="card">
  <h2>Wallet Balances</h2>
  <div id="walletBalances">Loading...</div>
</div>

<div class="card">
  <h2>Trade Spot</h2>
  <div class="input-group">
    <label>From Coin</label>
    <select id="coinFrom"></select>
  </div>

  <div class="input-group">
    <label>To Coin</label>
    <select id="coinTo"></select>
  </div>

  <div class="input-group">
    <label>Amount</label>
    <input type="number" id="amount" placeholder="0.0000">
    <button type="button" id="maxBtn" style="margin-top:8px;width:100%;background:#28a745;">Use Max Balance</button>
  </div>

  <div class="input-group">
    <label>Converted Amount</label>
    <div id="convertedAmount">-</div>
  </div>

  <button id="tradeBtn">Trade</button>
</div>

<div class="card">
  <h2>Trade History</h2>
  <div class="table-container">
    <table>
      <thead>
        <tr><th>Date</th><th>Pair</th><th>Amount</th><th>Price</th></tr>
      </thead>
      <tbody id="tradeHistory">
        <tr><td colspan="4">No trades yet</td></tr>
      </tbody>
    </table>
  </div>
</div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  "https://iecnioogmafgxwarmkxz.supabase.co",
  "YOUR_SUPABASE_ANON_KEY_HERE"
);

let user, wallets={}, marketCoins=[];

/* ========== MENU ========== */
const sideMenu = document.getElementById("sideMenu");
document.getElementById("menuBtn").onclick = ()=>sideMenu.classList.toggle("active");
document.getElementById("closeMenu").onclick = ()=>sideMenu.classList.remove("active");

/* ========== INIT ========== */
async function init(){
  const { data:{ session } } = await supabase.auth.getSession();
  if(!session){ alert("Login required"); return; }
  user = session.user;
  await loadMarket();
  await loadWallets();
  await loadHistory();
}
window.onload = init;

/* ========== LOAD MARKET COINS ========== */
async function loadMarket(){
  const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1");
  marketCoins = await res.json();
}

/* ========== LOAD WALLET ========== */
async function loadWallets(){
  const { data } = await supabase.from('wallets').select('*').eq('user_id', user.id);
  wallets = {};
  if(data) data.forEach(w=>{
    if(Number(w.balance)>0) wallets[w.coin_symbol.toUpperCase()] = Number(w.balance);
  });
  renderWallet();
  populateSelects();
}

function renderWallet(){
  let html="<ul>";
  const keys=Object.keys(wallets);
  if(keys.length===0) html+="<li>No balance</li>";
  keys.forEach(c=> html+=`<li>${c}: ${wallets[c]}</li>`);
  html+="</ul>";
  document.getElementById("walletBalances").innerHTML=html;
}

/* ========== POPULATE SELECTS ========== */
function populateSelects(){
  const from=document.getElementById("coinFrom");
  const to=document.getElementById("coinTo");
  from.innerHTML=""; to.innerHTML="";
  Object.keys(wallets).forEach(c=> from.innerHTML+=`<option value="${c}">${c}</option>`);
  marketCoins.forEach(c=> to.innerHTML+=`<option value="${c.symbol.toUpperCase()}">${c.symbol.toUpperCase()} - $${c.current_price}</option>`);
  updateConverted();
}

/* ========== CONVERT ========== */
function updateConverted(){
  const amount=Number(document.getElementById("amount").value);
  const from=document.getElementById("coinFrom").value;
  const to=document.getElementById("coinTo").value;
  if(!amount||!from||!to){ document.getElementById("convertedAmount").innerText="-"; return;}
  const f=marketCoins.find(c=>c.symbol.toUpperCase()===from);
  const t=marketCoins.find(c=>c.symbol.toUpperCase()===to);
  if(!f||!t) return;
  const result=(amount*f.current_price)/t.current_price;
  document.getElementById("convertedAmount").innerText=result.toFixed(6);
}

document.getElementById("amount").addEventListener("input",updateConverted);
document.getElementById("coinFrom").addEventListener("change",updateConverted);
document.getElementById("coinTo").addEventListener("change",updateConverted);

/* ========== USE MAX BALANCE ========== */
document.getElementById("maxBtn").addEventListener("click", function(){
  const from=document.getElementById("coinFrom").value;
  if(!wallets[from]){ alert("No balance"); return; }
  document.getElementById("amount").value=wallets[from];
  updateConverted();
});

/* ========== TRADE ========== */
document.getElementById("tradeBtn").onclick = async function(){
  const amount=Number(document.getElementById("amount").value);
  const from=document.getElementById("coinFrom").value;
  const to=document.getElementById("coinTo").value;
  if(!amount||amount<=0) return alert("Invalid amount");
  if(!wallets[from]||wallets[from]<amount) return alert("Insufficient balance");

  const f=marketCoins.find(c=>c.symbol.toUpperCase()===from);
  const t=marketCoins.find(c=>c.symbol.toUpperCase()===to);
  const converted=(amount*f.current_price)/t.current_price;

  // UPDATE FROM WALLET
  const { error:e1 } = await supabase.from('wallets')
    .update({balance: wallets[from]-amount})
    .eq('user_id', user.id)
    .eq('coin_symbol', from);
  if(e1){ console.error(e1); return alert("Wallet update failed"); }

  // UPDATE TO WALLET
  const { data: existing } = await supabase.from('wallets')
    .select('*')
    .eq('user_id', user.id)
    .eq('coin_symbol', to);
  if(existing.length>0){
    await supabase.from('wallets')
      .update({balance: Number(existing[0].balance)+converted})
      .eq('user_id', user.id)
      .eq('coin_symbol', to);
  } else {
    await supabase.from('wallets')
      .insert({user_id:user.id, coin_symbol:to, balance:converted, locked:0});
  }

  // INSERT HISTORY
  await supabase.from('trade_history').insert({
    user_id:user.id,
    trade_type:"spot",
    coin_symbol: from+"/"+to,
    amount:amount,
    price_usd:f.current_price,
    side:"convert",
    created_at:new Date()
  });

  alert("Trade Successful ✅");
  await loadWallets();
  await loadHistory();
};

/* ========== LOAD HISTORY ========== */
async function loadHistory(){
  const { data } = await supabase.from('trade_history')
    .select('*')
    .eq('user_id', user.id)
    .order('created_at',{ascending:false});
  const tbody=document.getElementById("tradeHistory");
  tbody.innerHTML="";
  if(!data||data.length===0){ tbody.innerHTML='<tr><td colspan="4">No trades yet</td></tr>'; return; }
  data.forEach(t=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${new Date(t.created_at).toLocaleString()}</td>
      <td>${t.coin_symbol}</td>
      <td>${t.amount}</td>
      <td>$${t.price_usd}</td>`;
    tbody.appendChild(tr);
  });
}
</script>
</body>
</html>
