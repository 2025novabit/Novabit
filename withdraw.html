<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdrawal | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;font-size:18px}
.container{padding:20px}
.coin-scroll{display:flex;flex-direction:column;overflow-y:auto;gap:10px;max-height:60vh;padding:10px 0}
.coin-card{background:#fff;border:1px solid #ccc;border-radius:10px;padding:10px;text-align:center;width:100%;cursor:pointer; display:flex; align-items:center; gap:10px}
.coin-card:hover{border-color:#4b49ac}
.coin-card img{width:40px;height:40px;margin:0}
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);width:360px;max-height:80%;overflow-y:auto;background:#fff;box-shadow:0 0 15px rgba(0,0,0,.3);padding:20px;transition:.3s;z-index:100;display:none}
.panel.active{display:block}
.close, .back{background:#e74c3c;color:#fff;border:none;padding:6px 10px;border-radius:5px; cursor:pointer;}
input.amount{width:100%;padding:8px;margin-top:10px;border-radius:5px;border:1px solid #ccc}
button.max-btn{background:#28a745;margin-top:8px;width:100%;padding:8px;color:#fff;border:none;border-radius:5px;cursor:pointer}
select.network{width:100%;padding:8px;margin-top:10px;border-radius:5px;border:1px solid #ccc}
button.main{margin-top:15px;background:#4b49ac;color:#fff;border:none;padding:10px 15px;border-radius:5px;cursor:pointer}
.address{background:#f1f1f1;padding:10px;border-radius:5px;font-family:monospace;margin-top:10px; display:flex; justify-content:space-between; align-items:center;}
.notice{margin-top:20px;font-size:14px;color:#555}
.card{background:#fff;padding:15px;border-radius:10px;margin-top:20px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:8px;text-align:left;border-bottom:1px solid #ddd}
th{background:#1a1a2e;color:#fff}
</style>
</head>
<body>

<header>
  <button class="back" onclick="history.back()">Back</button>
  Withdrawal
</header>

<div class="container">
  <h3>Select Coin</h3>
  <div class="coin-scroll" id="coinScroll"></div>
</div>

<!-- Withdrawal Panel -->
<div class="panel" id="panel">
  <button class="close" onclick="closePanel()">Close</button>
  <h3 id="panelTitle"></h3>

  <label>Network:</label>
  <select id="networkSelect" class="network"></select>

  <label>Amount:</label>
  <input type="number" id="amountInput" class="amount" placeholder="Enter amount">
  <button type="button" class="max-btn" id="maxBtn">Use Max Balance</button>

  <div class="address">
    <span id="userAddress">—</span>
    <button onclick="copyAddress()">Copy</button>
  </div>

  <div class="notice">After confirming, your withdrawal request will be submitted.</div>

  <button class="main" onclick="submitWithdrawal()">Submit Withdrawal Request</button>
</div>

<div class="container">
  <div class="card">
    <h2>Withdrawal History</h2>
    <table>
      <thead>
        <tr><th>Date</th><th>Coin</th><th>Network</th><th>Amount</th><th>Status</th></tr>
      </thead>
      <tbody id="historyBody"><tr><td colspan="5">No withdrawals yet</td></tr></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userBalances = {}, userId = null;
const coinScroll = document.getElementById('coinScroll');
const panel = document.getElementById('panel');
const panelTitle = document.getElementById('panelTitle');
const networkSelect = document.getElementById('networkSelect');
const amountInput = document.getElementById('amountInput');
const maxBtn = document.getElementById('maxBtn');
const historyBody = document.getElementById('historyBody');
const addressSpan = document.getElementById('userAddress');

async function init(){
  const { data } = await supabase.auth.getSession();
  if(!data.session){ location.href='login.html'; return; }
  userId = data.session.user.id;
  addressSpan.innerText = data.session.user.email || 'N/A';

  await loadUserBalances();
  renderCoins();
  await loadHistory();
}

async function loadUserBalances(){
  const { data, error } = await supabase.from('wallets').select('coin_symbol,balance').eq('user_id', userId);
  if(error){ console.error(error); userBalances={}; return; }
  userBalances = {};
  data.forEach(w=> userBalances[w.coin_symbol] = Number(w.balance));
}

function renderCoins(){
  coinScroll.innerHTML='';
  Object.keys(userBalances).forEach(sym=>{
    const bal = userBalances[sym];
    const div = document.createElement('div');
    div.className='coin-card';
    div.innerHTML=`<div><b>${sym}</b><br>Balance: ${bal}</div>`;
    div.onclick = ()=> openPanel(sym);
    coinScroll.appendChild(div);
  });
}

async function openPanel(symbol){
  panelTitle.innerText = symbol + ' Withdrawal';
  networkSelect.innerHTML=''; amountInput.value='';
  const { data } = await supabase.from('deposit_wallets').select('network').eq('asset', symbol).eq('is_active', true);
  if(data.length>0){
    data.forEach(w=>{
      const opt = document.createElement('option');
      opt.value = w.network;
      opt.innerText = w.network;
      networkSelect.appendChild(opt);
    });
  }
  maxBtn.onclick = ()=> amountInput.value = userBalances[symbol];
  panel.classList.add('active');
}

function closePanel(){ panel.classList.remove('active'); }
function copyAddress(){ navigator.clipboard.writeText(addressSpan.innerText).then(()=>alert('Copied: '+addressSpan.innerText)); }

async function submitWithdrawal(){
  const coin = panelTitle.innerText.split(' ')[0];
  const network = networkSelect.value;
  const amount = Number(amountInput.value);
  if(!coin || !network || !amount || amount<=0){ alert('Fill all fields'); return; }

  const { data: wallet } = await supabase.from('wallets').select('*').eq('user_id', userId).eq('coin_symbol', coin).single();
  if(!wallet){ alert('Wallet not found'); return; }
  if(wallet.balance<amount){ alert('Insufficient balance'); return; }

  await supabase.from('wallets').update({ balance: wallet.balance-amount, locked: wallet.locked+amount }).eq('id', wallet.id);

  const { error } = await supabase.from('withdrawal_requests').insert({
    user_id:userId, coin_symbol:coin, network:network, amount:amount, status:'pending', created_at:new Date()
  });
  if(error){ alert('Failed'); return; }
  alert('Withdrawal request submitted ✅');
  closePanel();
  await loadUserBalances();
  renderCoins();
  await loadHistory();
}

async function loadHistory(){
  const { data } = await supabase.from('withdrawal_requests').select('*').eq('user_id',userId).order('created_at',{ascending:false});
  historyBody.innerHTML='';
  if(!data||data.length===0){ historyBody.innerHTML='<tr><td colspan="5">No withdrawals yet</td></tr>'; return; }
  data.forEach(r=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${new Date(r.created_at).toLocaleString()}</td><td>${r.coin_symbol}</td><td>${r.network}</td><td>${r.amount}</td><td>${r.status}</td>`;
    historyBody.appendChild(tr);
  });
}

init();
</script>
</body>
</html>
