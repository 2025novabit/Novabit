<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdrawal | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;text-align:center;font-size:18px}
.container{padding:20px}
.coin-card{background:#fff;border:1px solid #ccc;border-radius:10px;padding:12px;margin-bottom:10px;cursor:pointer}
.coin-card:hover{border-color:#4b49ac}
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
width:360px;background:#fff;box-shadow:0 0 15px rgba(0,0,0,.3);
padding:20px;display:none;z-index:100}
.panel.active{display:block}
input,select{width:100%;padding:8px;margin-top:8px;border-radius:5px;border:1px solid #ccc}
button{margin-top:10px;width:100%;padding:10px;background:#4b49ac;color:#fff;border:none;border-radius:5px;cursor:pointer}
button.max{background:#28a745}
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd;text-align:left}
th{background:#1a1a2e;color:#fff}
</style>
</head>

<body>

<header>Withdrawal</header>

<div class="container">

<h3>Your Balances</h3>
<div id="coinList">Loading balances...</div>

<h3>Withdrawal History</h3>
<table>
<thead>
<tr><th>Date</th><th>Coin</th><th>Amount</th><th>Status</th></tr>
</thead>
<tbody id="historyBody">
<tr><td colspan="4">Loading...</td></tr>
</tbody>
</table>

</div>

<div class="panel" id="panel">
<h3 id="panelTitle"></h3>

<label>Network</label>
<select id="networkSelect"></select>

<label>Amount</label>
<input type="number" id="amountInput" placeholder="0.0000">
<button class="max" onclick="useMax()">Use Max</button>

<div id="feeInfo" style="margin-top:5px;font-size:14px;color:#555"></div>

<label>Withdrawal Address</label>
<input type="text" id="addressInput" placeholder="Enter address">

<button onclick="submitWithdrawal()">Submit Withdrawal</button>
<button onclick="closePanel()" style="background:#e74c3c">Close</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = "https://iecnioogmafgxwarmkxz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userId;
let selectedWallet;

async function init(){
  const { data } = await supabase.auth.getSession();
  if(!data.session){
    alert("Please login first");
    return;
  }
  userId = data.session.user.id;

  await loadWallets();
  await loadHistory();
}

window.onload = init;

async function loadWallets(){
  const { data, error } = await supabase
    .from("wallets")
    .select("*")
    .eq("user_id", userId);

  const list = document.getElementById("coinList");
  list.innerHTML="";

  if(error || !data){
    list.innerHTML="Error loading balances";
    return;
  }

  const activeCoins = data.filter(w => Number(w.balance) > 0);

  if(activeCoins.length===0){
    list.innerHTML="No balance available";
    return;
  }

  activeCoins.forEach(wallet=>{
    const div=document.createElement("div");
    div.className="coin-card";
    div.innerHTML=`<b>${wallet.coin_symbol}</b><br>
    Balance: ${Number(wallet.balance).toFixed(8)}`;
    div.onclick=()=>openPanel(wallet);
    list.appendChild(div);
  });
}

async function openPanel(wallet){
  selectedWallet = wallet;
  document.getElementById("panelTitle").innerText =
    wallet.coin_symbol+" Withdrawal";

  document.getElementById("amountInput").value="";
  document.getElementById("addressInput").value="";
  document.getElementById("feeInfo").innerText="";

  const { data } = await supabase
    .from("deposit_wallets")
    .select("network")
    .eq("asset", wallet.coin_symbol);

  const select=document.getElementById("networkSelect");
  select.innerHTML="";

  if(data && data.length>0){
    data.forEach(n=>{
      const opt=document.createElement("option");
      opt.value=n.network;
      opt.textContent=n.network;
      select.appendChild(opt);
    });
  }else{
    select.innerHTML="<option>No Network</option>";
  }

  document.getElementById("panel").classList.add("active");
}

function useMax(){
  document.getElementById("amountInput").value =
    selectedWallet.balance;
  calculateFee();
}

document.getElementById("amountInput")
.addEventListener("input", calculateFee);

function calculateFee(){
  const amount = Number(
    document.getElementById("amountInput").value
  );
  if(!amount) return;

  const fee = amount * 0.0001;
  const receive = amount - fee;

  document.getElementById("feeInfo").innerText =
    "Fee: "+fee.toFixed(8)+
    " | You Receive: "+receive.toFixed(8);
}

function closePanel(){
  document.getElementById("panel").classList.remove("active");
}

async function submitWithdrawal(){

  const amount =
    Number(document.getElementById("amountInput").value);
  const address =
    document.getElementById("addressInput").value;

  if(!amount || amount<=0)
    return alert("Invalid amount");

  if(amount > selectedWallet.balance)
    return alert("Insufficient balance");

  if(!address)
    return alert("Address required");

  const fee = amount * 0.0001;

  // 1️⃣ update wallet
  await supabase.from("wallets")
    .update({
      balance: selectedWallet.balance - amount,
      locked: Number(selectedWallet.locked || 0) + amount
    })
    .eq("id", selectedWallet.id);

  // 2️⃣ insert withdraw request
  await supabase.from("withdraw_requests")
    .insert({
      user_id: userId,
      coin_symbol: selectedWallet.coin_symbol,
      amount: amount,
      status: "pending",
      created_at: new Date()
    });

  alert("Withdrawal submitted");

  closePanel();
  await loadWallets();
  await loadHistory();
}

async function loadHistory(){
  const { data } = await supabase
    .from("withdraw_requests")
    .select("*")
    .eq("user_id", userId)
    .order("created_at",{ascending:false});

  const body=document.getElementById("historyBody");
  body.innerHTML="";

  if(!data || data.length===0){
    body.innerHTML=
      "<tr><td colspan='4'>No withdrawals</td></tr>";
    return;
  }

  data.forEach(r=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${new Date(r.created_at).toLocaleString()}</td>
      <td>${r.coin_symbol}</td>
      <td>${r.amount}</td>
      <td>${r.status}</td>
    `;
    body.appendChild(tr);
  });
}

</script>
</body>
</html>
