<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdraw Request | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;text-align:center;font-size:18px;display:flex;justify-content:space-between;align-items:center}
.container{padding:20px}
label{display:block;margin-top:12px;font-size:14px}
select,input{width:100%;padding:8px;margin-top:5px;border-radius:5px;border:1px solid #ccc}
button{margin-top:20px;width:100%;padding:10px;background:#4b49ac;color:#fff;border:none;border-radius:5px;cursor:pointer}
button.back{background:#e74c3c;width:auto;padding:6px 12px;margin-right:10px}
.table-container{max-height:250px;overflow-y:auto;margin-top:20px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;text-align:left}
th{background:#1a1a2e;color:#fff}
tr:nth-child(even){background:#f1f1f1}
.status-pending{color:orange;font-weight:600}
.status-approved{color:green;font-weight:600}
.status-rejected{color:red;font-weight:600}
</style>
</head>
<body>

<header>
  <button class="back" onclick="history.back()">Back</button>
  Withdraw Request
</header>

<div class="container">

<div class="card">
  <label>Coin</label>
  <select id="coinSelect"></select>

  <label>Amount</label>
  <input type="number" id="amountInput" placeholder="Enter amount">
  <button type="button" id="maxBtn" style="margin-top:8px;background:#28a745;">Use Max Balance</button>

  <button id="withdrawBtn">Submit Withdraw</button>
</div>

<div class="card">
  <h2>Withdraw History</h2>
  <div class="table-container">
    <table>
      <thead>
        <tr><th>Date</th><th>Coin</th><th>Amount</th><th>Status</th></tr>
      </thead>
      <tbody id="withdrawHistory">
        <tr><td colspan="4">No withdraw requests</td></tr>
      </tbody>
    </table>
  </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA';
const supabase = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let userId=null, wallets={};

async function init(){
  const { data } = await supabase.auth.getSession();
  if(!data.session){ location.href='login.html'; return; }
  userId = data.session.user.id;

  await loadWallets();
  await loadWithdrawHistory();
}
window.onload = init;

async function loadWallets(){
  const { data } = await supabase.from('wallets').select('*').eq('user_id',userId);
  wallets={};
  if(data) data.forEach(w=> { if(Number(w.balance)>0) wallets[w.coin_symbol.toUpperCase()] = Number(w.balance); });

  const coinSelect=document.getElementById('coinSelect');
  coinSelect.innerHTML='';
  Object.keys(wallets).forEach(c=> coinSelect.innerHTML += `<option value="${c}">${c}</option>`);
}

document.getElementById('maxBtn').addEventListener('click',()=>{
  const coin=document.getElementById('coinSelect').value;
  if(wallets[coin]) document.getElementById('amountInput').value = wallets[coin];
});

document.getElementById('withdrawBtn').addEventListener('click', async ()=>{
  const coin=document.getElementById('coinSelect').value;
  const amount=Number(document.getElementById('amountInput').value);
  if(!coin || !amount || amount<=0){ alert('Invalid amount'); return; }
  if(wallets[coin]<amount){ alert('Insufficient balance'); return; }

  const { error } = await supabase.from('withdraw_requests').insert({
    user_id:userId,
    coin_symbol:coin,
    amount:amount,
    status:'pending',
    created_at:new Date()
  });

  if(error){ alert('Failed to submit withdraw'); return; }
  alert('Withdraw request submitted ✅');
  await loadWithdrawHistory();
});

async function loadWithdrawHistory(){
  const { data } = await supabase.from('withdraw_requests')
    .select('*')
    .eq('user_id',userId)
    .order('created_at',{ascending:false});

  const tbody=document.getElementById('withdrawHistory');
  tbody.innerHTML='';
  if(!data || data.length===0){ tbody.innerHTML='<tr><td colspan="4">No withdraw requests</td></tr>'; return; }

  data.forEach(r=>{
    const tr=document.createElement('tr');
    let statusClass='status-pending';
    if(r.status==='approved') statusClass='status-approved';
    else if(r.status==='rejected') statusClass='status-rejected';
    tr.innerHTML=`
      <td>${new Date(r.created_at).toLocaleString()}</td>
      <td>${r.coin_symbol}</td>
      <td>${r.amount}</td>
      <td class="${statusClass}">${r.status}</td>`;
    tbody.appendChild(tr);
  });
}
</script>

</body>
</html>
