<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdraw | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;text-align:center;font-size:18px; display:flex; justify-content:space-between; align-items:center;}
.container{padding:20px}
#searchInput{width:100%;padding:8px;border-radius:5px;border:1px solid #ccc;margin-bottom:10px}
.coin-scroll{display:flex;flex-direction:column;overflow-y:auto;gap:10px;max-height:35vh;padding:10px 0}
.coin-card{background:#fff;border:1px solid #ccc;border-radius:10px;padding:10px;text-align:center;width:100%;cursor:pointer; display:flex; align-items:center; gap:10px}
.coin-card:hover{border-color:#4b49ac}
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);width:360px;max-height:80%;overflow-y:auto;background:#fff;box-shadow:0 0 15px rgba(0,0,0,.3);padding:20px;transition:.3s;z-index:100;display:none}
.panel.active{display:block}
.close, .back{background:#e74c3c;color:#fff;border:none;padding:6px 10px;border-radius:5px; cursor:pointer;}
button.main{margin-top:15px;background:#4b49ac;color:#fff;border:none;padding:10px 15px;border-radius:5px;cursor:pointer;width:100%}
select.network, input#amountInput, input#addressInput{width:100%;padding:8px;margin-top:10px;border-radius:5px;border:1px solid #ccc}
button.max-btn{background:#4b49ac;color:#fff;border:none;padding:5px 8px;border-radius:4px;cursor:pointer;margin-top:5px;margin-bottom:10px}
.history-item{background:#fff;border:1px solid #ccc;border-radius:10px;padding:10px;margin-top:10px;position:relative}
.status-badge{padding:2px 6px;border-radius:4px;color:#fff;font-size:12px}
.status-badge.pending{background:orange}
.status-badge.completed{background:green}
.status-badge.cancelled{background:red}
button.cancel{position:absolute;right:10px;top:10px;background:#e74c3c;color:#fff;border:none;padding:5px 10px;border-radius:4px;cursor:pointer}
button.cancel[disabled]{background:#aaa;cursor:not-allowed}
</style>
</head>
<body>

<header>
  <button class="back" onclick="history.back()">Back</button>
  Withdraw
</header>

<div class="container">
  <h3>Your Coins</h3>
  <input type="text" id="searchInput" placeholder="Search coin...">
  <div class="coin-scroll" id="coinScroll"></div>

  <h3>Withdrawal History</h3>
  <div id="historyList">Loading...</div>
</div>

<!-- Withdraw Panel -->
<div class="panel" id="panel">
  <button class="close" onclick="closePanel()">Close</button>
  <h3 id="panelTitle"></h3>

  <label for="networkSelect">Network:</label>
  <select id="networkSelect" class="network"></select>

  <label>Amount:</label>
  <input type="number" id="amountInput" placeholder="0.0000">
  <button type="button" class="max-btn" id="maxBtn">Use Max Balance</button>

  <label>Withdrawal Address:</label>
  <input type="text" id="addressInput" placeholder="">

  <div class="notice" id="feeNotice">Fee: 0.01%</div>

  <button class="main" id="submitBtn">Submit Withdrawal Request</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const coinScroll = document.getElementById('coinScroll');
const panel = document.getElementById('panel');
const panelTitle = document.getElementById('panelTitle');
const networkSelect = document.getElementById('networkSelect');
const amountInput = document.getElementById('amountInput');
const maxBtn = document.getElementById('maxBtn');
const addressInput = document.getElementById('addressInput');
const submitBtn = document.getElementById('submitBtn');
const historyList = document.getElementById('historyList');

let allCoins = [];
let userBalances = {};
let selectedCoin = null;
let userId = null;

async function loadUser(){
  const { data: auth } = await supabaseClient.auth.getUser();
  if(!auth.user) return;
  userId = auth.user.id;
  return auth.user;
}

async function loadUserBalances(){
  if(!userId) return;
  const { data, error } = await supabaseClient
    .from('wallets')
    .select('coin_symbol,balance,locked')
    .eq('user_id', userId);
  if(error) return;
  userBalances = {};
  data.forEach(w => { if(Number(w.balance)>0) userBalances[w.coin_symbol]=Number(w.balance); });
  allCoins = Object.keys(userBalances).map(sym=>({symbol:sym,balance:userBalances[sym]}));
  renderCoins(allCoins);
}

function renderCoins(coins){
  coinScroll.innerHTML = '';
  coins.forEach(c=>{
    const div = document.createElement('div');
    div.className='coin-card';
    div.innerHTML=`<b>${c.symbol}</b> Balance: ${c.balance}`;
    div.onclick = ()=>openPanel(c.symbol);
    coinScroll.appendChild(div);
  });
}

document.getElementById('searchInput').addEventListener('input', ()=>{
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderCoins(allCoins.filter(c=>c.symbol.toLowerCase().includes(q)));
});

async function openPanel(symbol){
  selectedCoin = symbol;
  panelTitle.innerText = symbol + ' Withdrawal';
  amountInput.value = '';
  addressInput.value = ''; // آدرس خالی
  networkSelect.innerHTML = '';
  submitBtn.disabled = false;

  const { data } = await supabaseClient.from('deposit_wallets')
    .select('network')
    .eq('asset',symbol).eq('is_active',true);

  data.forEach((w)=>{
    const opt = document.createElement('option');
    opt.value=w.network;
    opt.innerText=w.network;
    networkSelect.appendChild(opt);
  });

  panel.classList.add('active');
}

maxBtn.onclick = ()=>{ if(selectedCoin) amountInput.value = userBalances[selectedCoin]; };

submitBtn.onclick = async ()=>{
  const amount = Number(amountInput.value);
  const fee = amount*0.0001;
  const withdrawAmount = amount - fee;
  const address = addressInput.value;
  const network = networkSelect.value;
  if(!selectedCoin || amount<=0) return alert("Enter valid amount");
  if(!address) return alert("Address required");

  // کاهش موجودی ولت
  const { data: wallet } = await supabaseClient.from('wallets')
    .select('*').eq('user_id',userId).eq('coin_symbol',selectedCoin).single();
  if(!wallet) return;
  const newBalance = wallet.balance - amount;
  const newLocked = (Number(wallet.locked)||0) + amount;
  await supabaseClient.from('wallets').update({balance:newBalance,locked:newLocked}).eq('id',wallet.id);
  userBalances[selectedCoin]=newBalance;

  // ثبت درخواست برداشت با شبکه و آدرس
  const { data: wr } = await supabaseClient.from('withdraw_requests')
    .insert([{user_id:userId,coin_symbol:selectedCoin,amount:withdrawAmount,status:'pending',network,address,created_at:new Date().toISOString()}]).select();

  submitBtn.disabled=true;
  closePanel();
  loadUserBalances();
  loadHistory();
};

function closePanel(){ panel.classList.remove('active'); }

// لغو فقط یک بار + آپدیت در دیتابیس
async function cancelWithdrawal(row, btn){
  if(row.status!=='pending') return;
  // بروزرسانی وضعیت در دیتابیس
  await supabaseClient.from('withdraw_requests').update({status:'cancelled'}).eq('id',row.id);
  // بازگشت موجودی
  const { data: wallet } = await supabaseClient.from('wallets')
    .select('*').eq('user_id',userId).eq('coin_symbol',row.coin_symbol).single();
  if(wallet){
    await supabaseClient.from('wallets').update({
      balance: wallet.balance + Number(row.amount),
      locked: Math.max(0,wallet.locked - Number(row.amount))
    }).eq('id',wallet.id);
    userBalances[row.coin_symbol]=wallet.balance + Number(row.amount);
  }
  btn.disabled=true;
  btn.innerText='CANCELLED';
  row.status='cancelled';
  loadUserBalances();
  loadHistory();
}

async function loadHistory(){
  const { data } = await supabaseClient.from('withdraw_requests')
    .select('*')
    .eq('user_id',userId)
    .order('created_at',{ascending:false});
  historyList.innerHTML='';
  if(!data || data.length===0){ historyList.innerHTML="No withdrawals yet"; return; }
  data.forEach(row=>{
    const div = document.createElement('div');
    div.className='history-item';
    const statusSpan = document.createElement('span');
    statusSpan.className='status-badge '+row.status;
    statusSpan.textContent=row.status.toUpperCase();
    div.innerHTML=`<b>${row.coin_symbol}</b><br>
                   Amount: ${Number(row.amount).toFixed(8)}<br>
                   Network: ${row.network || ''}<br>
                   Address: ${row.address || ''}<br>
                   Date: ${new Date(row.created_at).toLocaleString()}<br>`;
    div.appendChild(statusSpan);
    if(row.status==='pending'){
      const btn=document.createElement('button');
      btn.className='cancel';
      btn.innerText='Cancel';
      btn.onclick=()=>cancelWithdrawal(row,btn);
      div.appendChild(btn);
    }
    historyList.appendChild(div);
  });
}

// Init
(async()=>{
  await loadUser();
  await loadUserBalances();
  loadHistory();
})();
</script>
</body>
</html>
