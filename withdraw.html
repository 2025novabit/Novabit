<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdrawal | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;font-size:18px}
.container{padding:20px}
.coin-scroll{display:flex;flex-direction:column;overflow-y:auto;gap:10px;max-height:50vh;margin-bottom:10px}
.coin-card{background:#fff;border:1px solid #ccc;border-radius:10px;padding:10px;text-align:center;cursor:pointer;display:flex;align-items:center;gap:10px}
.coin-card:hover{border-color:#4b49ac}
.coin-card img{width:40px;height:40px}
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:360px;max-height:90%;overflow-y:auto;background:#fff;box-shadow:0 0 15px rgba(0,0,0,.3);padding:20px;display:none;z-index:100}
.panel.active{display:block}
.close{background:#e74c3c;color:#fff;border:none;padding:6px 10px;border-radius:5px;cursor:pointer;margin-bottom:10px}
input,select,button{width:100%;padding:8px;margin-top:5px;border-radius:5px;border:1px solid #ccc}
button.main{background:#4b49ac;color:#fff;border:none;padding:10px 15px;border-radius:5px;cursor:pointer;margin-top:10px}
button.max-btn{background:#28a745;color:#fff;border:none;padding:8px;margin-top:5px;border-radius:5px;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{padding:8px;text-align:left;border-bottom:1px solid #ddd}
th{background:#1a1a2e;color:#fff}
</style>
</head>
<body>

<header>
  <button class="back" onclick="history.back()">Back</button>
  Withdrawal
</header>

<div class="container">
  <h3>Your Coins</h3>
  <div class="coin-scroll" id="coinScroll"></div>

  <!-- Withdrawal Panel -->
  <div class="panel" id="panel">
    <button class="close" onclick="closePanel()">Close</button>
    <h3 id="panelTitle"></h3>

    <label>Network:</label>
    <select id="networkSelect"></select>

    <label>Amount:</label>
    <input type="number" id="amountInput" placeholder="0.0000">
    <button type="button" class="max-btn" id="maxBtn">Use Max Balance</button>

    <label>Withdrawal Address:</label>
    <input type="text" id="addressInput" placeholder="Enter your address">

    <label>After Fee Amount:</label>
    <input type="text" id="afterFee" readonly>

    <button class="main" onclick="submitWithdrawal()">Submit Withdrawal</button>
  </div>

  <h3>Withdrawal History</h3>
  <table>
    <thead>
      <tr>
        <th>Date</th><th>Coin</th><th>Network</th><th>Amount</th><th>After Fee</th><th>Address</th><th>Status</th>
      </tr>
    </thead>
    <tbody id="historyBody">
      <tr><td colspan="7">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA';

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userId = null;
let userBalances = {};
let currentSymbol = null;
const coinScroll = document.getElementById('coinScroll');
const panel = document.getElementById('panel');
const panelTitle = document.getElementById('panelTitle');
const networkSelect = document.getElementById('networkSelect');
const amountInput = document.getElementById('amountInput');
const addressInput = document.getElementById('addressInput');
const afterFee = document.getElementById('afterFee');
const maxBtn = document.getElementById('maxBtn');
const historyBody = document.getElementById('historyBody');

// Fee percent
const FEE_PERCENT = 0.5;

function formatBalance(balance){ return Number(balance).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:8}); }

async function loadUser(){
  const { data: sessionData } = await supabase.auth.getSession();
  if(!sessionData.session){ location.href='login.html'; return; }
  userId = sessionData.session.user.id;

  const { data, error } = await supabase.from('wallets').select('coin_symbol,balance,locked').eq('user_id', userId);
  if(error){ console.error(error); return; }
  data.forEach(w=>{ if(w.balance>0) userBalances[w.coin_symbol] = w.balance; });

  renderCoins();
  loadHistory();
}

function renderCoins(){
  coinScroll.innerHTML='';
  for(const symbol in userBalances){
    const div = document.createElement('div');
    div.className='coin-card';
    div.innerHTML=`<b>${symbol}</b> Balance: ${formatBalance(userBalances[symbol])}`;
    div.onclick=()=>openPanel(symbol);
    coinScroll.appendChild(div);
  }
}

async function openPanel(symbol){
  currentSymbol=symbol;
  panelTitle.innerText = symbol + ' Withdrawal';
  networkSelect.innerHTML='';
  amountInput.value='';
  afterFee.value='';
  addressInput.value='';

  const { data, error } = await supabase.from('deposit_wallets').select('network,address').eq('asset', symbol).eq('is_active', true);
  if(error || !data.length){ alert('No active networks'); return; }
  data.forEach(d=>{
    const opt=document.createElement('option');
    opt.value=d.network; opt.innerText=d.network;
    networkSelect.appendChild(opt);
  });

  panel.classList.add('active');
}

function closePanel(){ panel.classList.remove('active'); }

maxBtn.addEventListener('click', ()=>{
  if(!currentSymbol) return;
  amountInput.value=userBalances[currentSymbol];
  calculateAfterFee();
});

amountInput.addEventListener('input', calculateAfterFee);

function calculateAfterFee(){
  let amt = Number(amountInput.value);
  if(!amt) { afterFee.value=''; return; }
  let after = amt*(1-FEE_PERCENT/100);
  afterFee.value = after.toFixed(8);
}

async function submitWithdrawal(){
  const amount = Number(amountInput.value);
  const network = networkSelect.value;
  const address = addressInput.value;
  const after = Number(afterFee.value);

  if(!currentSymbol||!amount||!network||!address) return alert('Fill all fields');
  if(amount>userBalances[currentSymbol]) return alert('Insufficient balance');

  // lock wallet
  const { data: wallet } = await supabase.from('wallets').select('*').eq('user_id', userId).eq('coin_symbol', currentSymbol).single();
  if(!wallet) return alert('Wallet not found');

  const { error: updErr } = await supabase.from('wallets').update({ balance: wallet.balance-amount, locked: wallet.locked+amount }).eq('id', wallet.id);
  if(updErr) return alert('Failed to lock wallet');

  // insert request
  const { error } = await supabase.from('withdrawal_requests').insert({
    user_id: userId,
    coin_symbol: currentSymbol,
    network: network,
    amount: amount,
    after_fee: after,
    address: address,
    status: 'pending',
    created_at: new Date()
  });
  if(error) return alert('Failed to submit withdrawal');

  alert('Withdrawal submitted ✅');
  userBalances[currentSymbol]-=amount;
  closePanel();
  renderCoins();
  loadHistory();
}

// load history
async function loadHistory(){
  const { data, error } = await supabase.from('withdrawal_requests').select('*').eq('user_id', userId).order('created_at',{ascending:false});
  historyBody.innerHTML='';
  if(error||!data.length){ historyBody.innerHTML='<tr><td colspan="7">No withdrawals</td></tr>'; return; }
  data.forEach(r=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${new Date(r.created_at).toLocaleString()}</td>
                    <td>${r.coin_symbol}</td>
                    <td>${r.network}</td>
                    <td>${r.amount}</td>
                    <td>${r.after_fee}</td>
                    <td>${r.address}</td>
                    <td>${r.status}</td>`;
    historyBody.appendChild(tr);
  });
}

loadUser();
</script>

</body>
</html>
