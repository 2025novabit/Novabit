<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdrawal | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;text-align:center;font-size:18px; display:flex; justify-content:space-between; align-items:center;}
.container{padding:20px}
#searchInput{width:100%;padding:8px;border-radius:5px;border:1px solid #ccc;margin-bottom:10px}
.coin-scroll{display:flex;flex-direction:column;overflow-y:auto;gap:10px;max-height:35vh;padding:10px 0}
.coin-card{background:#fff;border:1px solid #ccc;border-radius:10px;padding:10px;text-align:center;width:100%;cursor:pointer; display:flex; align-items:center; gap:10px}
.coin-card:hover{border-color:#4b49ac}
.coin-card img{width:40px;height:40px;margin:0}
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);width:360px;max-height:80%;overflow-y:auto;background:#fff;box-shadow:0 0 15px rgba(0,0,0,.3);padding:20px;transition:.3s;z-index:100;display:none}
.panel.active{display:block}
.close, .back{background:#e74c3c;color:#fff;border:none;padding:6px 10px;border-radius:5px; cursor:pointer;}
.address{background:#f1f1f1;padding:10px;border-radius:5px;font-family:monospace;margin-top:10px; display:flex; justify-content:space-between; align-items:center;}
.notice{margin-top:15px;font-size:14px;color:#555}
button.main{margin-top:15px;background:#4b49ac;color:#fff;border:none;padding:10px 15px;border-radius:5px;cursor:pointer}
select.network, input[type=number], input[type=text]{width:100%;padding:8px;margin-top:10px;border-radius:5px;border:1px solid #ccc}
button.max-btn{margin-top:5px;background:#4b49ac;color:#fff;border:none;padding:5px 10px;border-radius:5px;cursor:pointer}
.history-container{margin-top:20px;background:#fff;padding:10px;border-radius:10px;max-height:30vh;overflow-y:auto}
.history-item{border-bottom:1px solid #ddd;padding:10px 0}
.status-badge{padding:2px 5px;border-radius:3px;font-size:12px;color:#fff}
.status-badge.pending{background:#f1c40f}
.status-badge.completed{background:#2ecc71}
.status-badge.cancelled{background:#7f8c8d}
button.cancel{margin-left:10px;background:#e74c3c;color:#fff;border:none;padding:5px 8px;border-radius:5px;cursor:pointer}
</style>
</head>
<body>

<header>
  <button class="back" onclick="history.back()">Back</button>
  Withdrawal
</header>

<div class="container">
  <h3>Select Coin</h3>
  <input type="text" id="searchInput" placeholder="Search coin...">
  <div class="coin-scroll" id="coinScroll"></div>
</div>

<!-- Withdrawal Panel -->
<div class="panel" id="panel">
  <button class="close" onclick="closePanel()">Close</button>
  <h3 id="panelTitle"></h3>

  <label for="networkSelect">Network:</label>
  <select id="networkSelect" class="network"></select>

  <label>Amount:</label>
  <input type="number" id="amountInput" placeholder="0.0000">
  <button type="button" class="max-btn" id="maxBtn">Use Max Balance</button>

  <label>Withdrawal Address:</label>
  <input type="text" id="addressInput" placeholder="Enter your address">

  <div class="notice">
    Withdrawal fee is 0.01% and will be deducted automatically.
  </div>

  <button class="main" onclick="submitWithdrawal()">Submit Withdrawal Request</button>
</div>

<div class="container">
  <h3>Withdrawal History</h3>
  <div class="history-container" id="historyList">Loading...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const coinScroll = document.getElementById('coinScroll');
const panel = document.getElementById('panel');
const panelTitle = document.getElementById('panelTitle');
const depositAddress = document.getElementById('depositAddress');
const networkSelect = document.getElementById('networkSelect');
const searchInput = document.getElementById('searchInput');
const amountInput = document.getElementById('amountInput');
const addressInput = document.getElementById('addressInput');
const maxBtn = document.getElementById('maxBtn');
const historyList = document.getElementById('historyList');

const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userBalances = {};
let userId = null;
let selectedCoin = null;

async function init(){
  const { data: auth } = await supabaseClient.auth.getUser();
  if(!auth.user) { alert("Please login"); return; }
  userId = auth.user.id;
  userBalances = await loadUserBalances();
  renderCoins(Object.keys(userBalances).map(sym=>({symbol:sym,balance:userBalances[sym]})));
  loadHistory();
}

async function loadUserBalances(){
  const { data, error } = await supabaseClient
    .from('wallets')
    .select('coin_symbol,balance,locked')
    .eq('user_id', userId);

  if(error) return {};
  const balances = {};
  data.forEach(w=>{
    balances[w.coin_symbol] = Number(w.balance);
  });
  return balances;
}

function renderCoins(coins){
  coinScroll.innerHTML = '';
  coins.forEach(coin=>{
    const div = document.createElement('div');
    div.className = 'coin-card';
    div.innerHTML = `<b>${coin.symbol}</b> - Balance: ${coin.balance}`;
    div.onclick = ()=>openPanel(coin.symbol, coin.balance);
    coinScroll.appendChild(div);
  });
}

searchInput.addEventListener('input', ()=>{
  const query = searchInput.value.toLowerCase();
  const filtered = Object.keys(userBalances)
    .filter(sym=>sym.toLowerCase().includes(query))
    .map(sym=>({symbol:sym,balance:userBalances[sym]}));
  renderCoins(filtered);
});

function openPanel(symbol, balance){
  selectedCoin = symbol;
  panelTitle.innerText = `${symbol} Withdrawal`;
  amountInput.value = '';
  addressInput.value = '';
  networkSelect.innerHTML = '';
  maxBtn.onclick = ()=> amountInput.value = balance;
  // load networks from deposit_wallets table
  supabaseClient.from('deposit_wallets')
    .select('network,address')
    .eq('asset',symbol)
    .then(res=>{
      res.data.forEach((w,idx)=>{
        const opt = document.createElement('option');
        opt.value = w.network;
        opt.innerText = w.network;
        networkSelect.appendChild(opt);
      });
    });
  panel.classList.add('active');
}

function closePanel(){ panel.classList.remove('active'); }

async function submitWithdrawal(){
  const amount = parseFloat(amountInput.value);
  if(!amount || amount <=0){ alert("Enter valid amount"); return; }
  const address = addressInput.value.trim();
  if(!address){ alert("Enter withdrawal address"); return; }

  // Fee 0.01%
  const fee = amount * 0.0001;
  const finalAmount = amount - fee;

  // Lock the amount in wallet
  const { data: wallet } = await supabaseClient
    .from('wallets')
    .select('*')
    .eq('user_id', userId)
    .eq('coin_symbol', selectedCoin)
    .single();

  await supabaseClient.from('wallets')
    .update({
      balance: wallet.balance - amount,
      locked: wallet.locked + amount
    })
    .eq('id', wallet.id);

  // Insert withdraw request
  await supabaseClient.from('withdraw_requests')
    .insert({
      user_id: userId,
      coin_symbol: selectedCoin,
      amount: finalAmount,
      status: 'pending',
      created_at: new Date()
    });

  closePanel();
  userBalances[selectedCoin] = userBalances[selectedCoin] - amount;
  renderCoins(Object.keys(userBalances).map(sym=>({symbol:sym,balance:userBalances[sym]})));
  loadHistory();
}

async function cancelWithdrawal(row){
  if(row.status !== "pending") return;
  await supabaseClient.from('withdraw_requests')
    .update({status:"cancelled"})
    .eq('id',row.id);

  const { data: wallet } = await supabaseClient
    .from('wallets')
    .select('*')
    .eq('user_id', userId)
    .eq('coin_symbol', row.coin_symbol)
    .single();

  await supabaseClient.from('wallets')
    .update({
      balance: wallet.balance + Number(row.amount),
      locked: Math.max(0, wallet.locked - Number(row.amount))
    })
    .eq('id', wallet.id);

  userBalances[row.coin_symbol] += Number(row.amount);
  renderCoins(Object.keys(userBalances).map(sym=>({symbol:sym,balance:userBalances[sym]})));
  loadHistory();
}

async function loadHistory(){
  const { data } = await supabaseClient
    .from('withdraw_requests')
    .select('*')
    .eq('user_id', userId)
    .order('created_at',{ascending:false});

  if(!data || data.length===0){
    historyList.innerHTML = "No withdrawals yet";
    return;
  }

  historyList.innerHTML = "";
  data.forEach(row=>{
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <b>${row.coin_symbol}</b><br>
      Amount: ${Number(row.amount).toFixed(8)}<br>
      Date: ${new Date(row.created_at).toLocaleString()}<br>
      <span class="status-badge ${row.status}">${row.status.toUpperCase()}</span>
    `;
    if(row.status==="pending"){
      const btn = document.createElement('button');
      btn.className = 'cancel';
      btn.innerText = "Cancel";
      btn.onclick = ()=> cancelWithdrawal(row);
      div.appendChild(btn);
    }
    historyList.appendChild(div);
  });
}

init();
</script>
</body>
</html>
