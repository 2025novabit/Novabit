<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdrawal | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;text-align:center;font-size:18px;display:flex;justify-content:space-between;align-items:center;}
.container{padding:20px}
#searchInput{width:100%;padding:8px;border-radius:5px;border:1px solid #ccc;margin-bottom:10px}
.coin-scroll{display:flex;flex-direction:column;overflow-y:auto;gap:10px;max-height:40vh;padding:10px 0}
.coin-card{background:#fff;border:1px solid #ccc;border-radius:10px;padding:10px;text-align:center;width:100%;cursor:pointer; display:flex; align-items:center; gap:10px}
.coin-card:hover{border-color:#4b49ac}
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:360px;max-height:90%;overflow-y:auto;background:#fff;box-shadow:0 0 15px rgba(0,0,0,.3);padding:20px;transition:.3s;z-index:100;display:none}
.panel.active{display:block}
.close, .back{background:#e74c3c;color:#fff;border:none;padding:6px 10px;border-radius:5px; cursor:pointer;}
.notice{margin-top:10px;font-size:14px;color:#555}
button.main{margin-top:15px;background:#4b49ac;color:#fff;border:none;padding:10px 15px;border-radius:5px;cursor:pointer;width:100%}
button.cancel{margin-top:10px;background:#aaa;color:#fff;border:none;padding:8px 12px;border-radius:5px;cursor:pointer;width:100%}
input, select{width:100%;padding:8px;margin-top:5px;border-radius:5px;border:1px solid #ccc}
.history{margin-top:20px;background:#fff;padding:10px;border-radius:10px;max-height:250px;overflow-y:auto}
.history table{width:100%;border-collapse:collapse}
.history th, .history td{border:1px solid #ccc;padding:5px;text-align:center;font-size:13px}
</style>
</head>
<body>

<header>
  <button class="back" onclick="history.back()">Back</button>
  Withdrawal
</header>

<div class="container">
  <h3>Select Coin</h3>
  <input type="text" id="searchInput" placeholder="Search coin...">
  <div class="coin-scroll" id="coinScroll"></div>
</div>

<!-- Withdrawal Panel -->
<div class="panel" id="panel">
  <button class="close" onclick="closePanel()">Close</button>
  <h3 id="panelTitle"></h3>

  <label for="networkSelect">Network:</label>
  <select id="networkSelect"></select>

  <label>Available Balance:</label>
  <div id="balanceDisplay">0</div>

  <label>Amount:</label>
  <input type="number" id="amountInput" placeholder="0.0000">
  <button type="button" class="main" id="maxBtn">Use Max Balance</button>

  <label>Withdrawal Address:</label>
  <input type="text" id="addressInput" placeholder="Enter your address">

  <div class="notice">A fee of 0.01% will be deducted from the amount.</div>

  <button class="main" id="submitBtn">Submit Withdrawal</button>
  <button class="cancel" id="cancelBtn" style="display:none">Cancel Withdrawal</button>
</div>

<div class="container">
  <h3>Withdrawal History</h3>
  <div class="history" id="historyDiv">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Coin</th>
          <th>Network</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA'; // جایگزین با کلید خودت
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const coinScroll = document.getElementById('coinScroll');
const panel = document.getElementById('panel');
const panelTitle = document.getElementById('panelTitle');
const networkSelect = document.getElementById('networkSelect');
const balanceDisplay = document.getElementById('balanceDisplay');
const amountInput = document.getElementById('amountInput');
const addressInput = document.getElementById('addressInput');
const submitBtn = document.getElementById('submitBtn');
const cancelBtn = document.getElementById('cancelBtn');
const historyBody = document.getElementById('historyBody');
const searchInput = document.getElementById('searchInput');
const maxBtn = document.getElementById('maxBtn');

let userBalances = {};
let currentCoin = null;
let currentRequestId = null;

async function loadUserBalances() {
  const { data: auth } = await supabaseClient.auth.getUser();
  if(!auth.user) return {};
  const { data, error } = await supabaseClient.from('wallets').select('*').eq('user_id', auth.user.id);
  if(error) { console.error(error); return {}; }
  const balances = {};
  data.forEach(w => { if(w.balance>0) balances[w.coin_symbol] = w; });
  return balances;
}

async function loadCoins() {
  userBalances = await loadUserBalances();
  renderCoins(Object.keys(userBalances));
}

function renderCoins(coins) {
  coinScroll.innerHTML='';
  coins.forEach(symbol=>{
    const coin = userBalances[symbol];
    const div = document.createElement('div');
    div.className='coin-card';
    div.innerHTML=`<div><b>${symbol}</b> - Balance: ${coin.balance}</div>`;
    div.onclick = ()=>openPanel(symbol);
    coinScroll.appendChild(div);
  });
}

async function openPanel(symbol) {
  currentCoin = symbol;
  currentRequestId = null;
  const coin = userBalances[symbol];
  panelTitle.innerText = `${symbol} Withdrawal`;
  balanceDisplay.innerText = coin.balance;
  amountInput.value='';
  addressInput.value='';
  cancelBtn.style.display='none';
  cancelBtn.disabled=false;
  submitBtn.disabled=false;

  networkSelect.innerHTML='';
  const { data: networks, error } = await supabaseClient.from('deposit_wallets').select('*').eq('asset', symbol).eq('is_active', true);
  if(networks) networks.forEach(w=>{
    const opt = document.createElement('option');
    opt.value = w.network;
    opt.innerText = w.network;
    networkSelect.appendChild(opt);
  });

  panel.classList.add('active');
}

function closePanel(){ panel.classList.remove('active'); }

maxBtn.onclick = ()=>{
  if(!currentCoin) return;
  amountInput.value = userBalances[currentCoin].balance;
};

submitBtn.onclick = async ()=>{
  if(!currentCoin) return;
  const amount = parseFloat(amountInput.value);
  const address = addressInput.value.trim();
  if(!amount || amount<=0 || amount>userBalances[currentCoin].balance) { alert('Invalid amount'); return; }
  if(!address) { alert('Enter address'); return; }

  const fee = amount*0.0001;
  const finalAmount = amount - fee;

  const { data, error } = await supabaseClient.from('withdraw_requests').insert([{
    user_id: (await supabaseClient.auth.getUser()).data.user.id,
    coin_symbol: currentCoin,
    amount: finalAmount,
    network: networkSelect.value,
    address: address,
    status:'Pending'
  }]).select();
  if(error){ alert('Failed to create request'); return; }

  currentRequestId = data[0].id;
  submitBtn.disabled=true;
  cancelBtn.style.display='block';
  renderHistory();
};

cancelBtn.onclick = async ()=>{
  if(!currentRequestId) return;
  await supabaseClient.from('withdraw_requests').update({status:'Cancelled'}).eq('id', currentRequestId);
  cancelBtn.disabled=true;
  submitBtn.disabled=true;
  renderHistory();
};

async function renderHistory() {
  const { data, error } = await supabaseClient.from('withdraw_requests').select('*').order('created_at',{ascending:false});
  if(error) return;
  historyBody.innerHTML='';
  data.forEach(req=>{
    const tr = document.createElement('tr');
    tr.innerHTML=`
      <td>${new Date(req.created_at).toLocaleString()}</td>
      <td>${req.coin_symbol}</td>
      <td>${req.network||''}</td>
      <td>${req.amount}</td>
      <td>${req.status}</td>
      <td>${req.status==='Pending'?'<button onclick="cancelFromHistory(\\''+req.id+'\\')">Cancel</button>':'-'}</td>
    `;
    historyBody.appendChild(tr);
  });
}

window.cancelFromHistory = async (id)=>{
  await supabaseClient.from('withdraw_requests').update({status:'Cancelled'}).eq('id', id);
  renderHistory();
};

searchInput.addEventListener('input', ()=>{
  const query = searchInput.value.toLowerCase();
  const filtered = Object.keys(userBalances).filter(s=>s.toLowerCase().includes(query));
  renderCoins(filtered);
});

loadCoins();
renderHistory();
</script>
</body>
</html>
