<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdraw Request | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;text-align:center;font-size:18px;display:flex;justify-content:space-between;align-items:center}
.container{padding:20px}
label{display:block;margin-top:12px;font-size:14px}
select,input{width:100%;padding:8px;margin-top:5px;border-radius:5px;border:1px solid #ccc}
button{margin-top:20px;width:100%;padding:10px;background:#4b49ac;color:#fff;border:none;border-radius:5px;cursor:pointer}
.back{background:#e74c3c;width:auto;padding:6px 12px}
.table-container{margin-top:20px;max-height:200px;overflow-y:auto;background:#fff;border-radius:5px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;text-align:left;border-bottom:1px solid #eee}
th{background:#1a1a2e;color:#fff}
</style>
</head>

<body>

<header>
  <button class="back" onclick="history.back()">Back</button>
  Withdraw Request
</header>

<div class="container">

  <label>Coin</label>
  <select id="coinSelect"></select>

  <label>Network</label>
  <select id="networkSelect"></select>

  <label>Amount</label>
  <input type="number" id="amountInput" placeholder="Enter amount">

  <label>Address</label>
  <input type="text" id="addressInput" placeholder="Enter withdrawal address">

  <button onclick="submitWithdraw()">Submit Request</button>

  <div class="table-container">
    <h3>Withdraw History</h3>
    <table>
      <thead>
        <tr><th>Date</th><th>Coin</th><th>Amount</th><th>Network</th><th>Status</th></tr>
      </thead>
      <tbody id="withdrawHistory">
        <tr><td colspan="5">No withdraws yet</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA';

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY,{
  auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}
});

let userId = null;
const coinSelect = document.getElementById('coinSelect');
const networkSelect = document.getElementById('networkSelect');

async function init(){
  const { data } = await supabase.auth.getSession();
  if(!data.session){ location.href='login.html'; return; }
  userId = data.session.user.id;
  await loadWallets();
  await loadWithdrawHistory();
}

async function loadWallets(){
  const { data, error } = await supabase
    .from('wallets')
    .select('coin_symbol,balance')
    .eq('user_id', userId);

  if(error){ alert('Failed to load wallets'); return; }

  coinSelect.innerHTML = '';
  const available = data.filter(w=>Number(w.balance)>0);
  if(available.length===0){
    coinSelect.innerHTML='<option value="">No coins available</option>';
  } else {
    available.forEach(w=>{
      const opt = document.createElement('option');
      opt.value = w.coin_symbol;
      opt.innerText = `${w.coin_symbol} (Balance: ${w.balance})`;
      coinSelect.appendChild(opt);
    });
  }

  await loadNetworks();
}

async function loadNetworks(){
  networkSelect.innerHTML='';
  if(!coinSelect.value) return;

  const { data } = await supabase
    .from('withdraw_wallets')
    .select('network')
    .eq('asset', coinSelect.value)
    .eq('is_active', true);

  data.forEach(n=>{
    const opt = document.createElement('option');
    opt.value = n.network;
    opt.innerText = n.network;
    networkSelect.appendChild(opt);
  });
}

coinSelect.addEventListener('change', loadNetworks);

async function submitWithdraw(){
  const amount = document.getElementById('amountInput').value;
  const address = document.getElementById('addressInput').value;

  if(!amount || Number(amount)<=0){ alert('Amount required'); return; }
  if(!coinSelect.value){ alert('Coin required'); return; }
  if(!networkSelect.value){ alert('Network required'); return; }
  if(!address){ alert('Address required'); return; }

  const { error } = await supabase.from('withdraw_requests').insert({
    user_id: userId,
    asset: coinSelect.value,
    network: networkSelect.value,
    amount: amount,
    address: address,
    status: 'pending',
    created_at: new Date()
  });

  if(error){ alert('Submit failed'); return; }
  alert('Withdraw request submitted');
  document.getElementById('amountInput').value='';
  document.getElementById('addressInput').value='';
  await loadWithdrawHistory();
}

async function loadWithdrawHistory(){
  const { data } = await supabase
    .from('withdraw_requests')
    .select('*')
    .eq('user_id', userId)
    .order('created_at',{ascending:false});

  const tbody = document.getElementById('withdrawHistory');
  tbody.innerHTML='';
  if(!data || data.length===0){
    tbody.innerHTML='<tr><td colspan="5">No withdraws yet</td></tr>';
    return;
  }

  data.forEach(r=>{
    const tr = document.createElement('tr');
    tr.innerHTML=`
      <td>${new Date(r.created_at).toLocaleString()}</td>
      <td>${r.asset}</td>
      <td>${r.amount}</td>
      <td>${r.network}</td>
      <td>${r.status}</td>
    `;
    tbody.appendChild(tr);
  });
}

window.onload = init;
</script>

</body>
</html>
