<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Withdrawal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:20px}
h2{margin-top:0}
.coin{background:#fff;padding:10px;margin-bottom:8px;border-radius:8px;cursor:pointer;border:1px solid #ddd}
.coin:hover{border-color:#4b49ac}
.panel{background:#fff;padding:15px;border-radius:10px;margin-top:15px;display:none}
input,select,button{width:100%;padding:8px;margin-top:5px;margin-bottom:10px}
button{background:#4b49ac;color:#fff;border:none;border-radius:5px}
button:hover{opacity:0.9}
table{width:100%;background:#fff;margin-top:20px;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd;text-align:left}
th{background:#4b49ac;color:#fff}
</style>
</head>
<body>

<h2>Your Wallets</h2>
<div id="walletList">Loading...</div>

<div class="panel" id="withdrawPanel">
<h3 id="coinTitle"></h3>

<label>Network</label>
<select id="network">
<option value="TRC20">TRC20</option>
<option value="ERC20">ERC20</option>
<option value="BEP20">BEP20</option>
</select>

<label>Amount</label>
<input type="number" id="amount">
<button onclick="useMax()">Use Max</button>

<label>Address</label>
<input type="text" id="address">

<label>After Fee (0.01%)</label>
<input type="text" id="afterFee" readonly>

<button onclick="submitWithdraw()">Submit Withdrawal</button>
</div>

<h2>Withdrawal History</h2>
<table>
<thead>
<tr>
<th>Date</th>
<th>Coin</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>
<tbody id="history">Loading...</tbody>
</table>

<script>

const supabase = supabase.createClient(
'https://iecnioogmafgxwarmkxz.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA'
);

let userId=null;
let selectedCoin=null;
let selectedBalance=0;

async function init(){
const { data: session } = await supabase.auth.getSession();
if(!session.session){
alert("Please login first");
return;
}
userId=session.session.user.id;
loadWallets();
loadHistory();
}

async function loadWallets(){
const { data, error } = await supabase
.from('wallets')
.select('*')
.eq('user_id', userId)
.gt('balance', 0);

if(error){
document.getElementById('walletList').innerHTML="Error loading wallets";
return;
}

if(!data.length){
document.getElementById('walletList').innerHTML="No balance available";
return;
}

let html="";
data.forEach(w=>{
html+=`<div class="coin" onclick="openWithdraw('${w.coin_symbol}',${w.balance})">
<b>${w.coin_symbol}</b> - Balance: ${Number(w.balance).toFixed(8)}
</div>`;
});

document.getElementById('walletList').innerHTML=html;
}

function openWithdraw(symbol,balance){
selectedCoin=symbol;
selectedBalance=balance;
document.getElementById('withdrawPanel').style.display="block";
document.getElementById('coinTitle').innerText=symbol+" Withdrawal";
document.getElementById('amount').value="";
document.getElementById('afterFee').value="";
}

function useMax(){
document.getElementById('amount').value=selectedBalance;
calculateFee();
}

document.getElementById('amount').addEventListener('input',calculateFee);

function calculateFee(){
let amount=Number(document.getElementById('amount').value);
if(!amount){document.getElementById('afterFee').value="";return;}
let after=amount-(amount*0.0001);
document.getElementById('afterFee').value=after.toFixed(8);
}

async function submitWithdraw(){

let amount=Number(document.getElementById('amount').value);
let address=document.getElementById('address').value;
let network=document.getElementById('network').value;
let after=Number(document.getElementById('afterFee').value);

if(!amount||!address){
alert("Fill all fields");
return;
}

if(amount>selectedBalance){
alert("Insufficient balance");
return;
}

const { error: updateError } = await supabase
.from('wallets')
.update({
balance:selectedBalance-amount,
locked: amount
})
.eq('user_id',userId)
.eq('coin_symbol',selectedCoin);

if(updateError){
alert("Wallet update failed");
return;
}

const { error: insertError } = await supabase
.from('withdrawal_requests')
.insert({
user_id:userId,
coin_symbol:selectedCoin,
network:network,
amount:amount,
after_fee:after,
address:address,
status:'pending'
});

if(insertError){
alert("Insert failed");
return;
}

alert("Withdrawal Submitted");
document.getElementById('withdrawPanel').style.display="none";
loadWallets();
loadHistory();
}

async function loadHistory(){
const { data } = await supabase
.from('withdrawal_requests')
.select('*')
.eq('user_id',userId)
.order('created_at',{ascending:false});

if(!data||!data.length){
document.getElementById('history').innerHTML="<tr><td colspan='4'>No history</td></tr>";
return;
}

let html="";
data.forEach(r=>{
html+=`<tr>
<td>${new Date(r.created_at).toLocaleString()}</td>
<td>${r.coin_symbol}</td>
<td>${r.amount}</td>
<td>${r.status}</td>
</tr>`;
});
document.getElementById('history').innerHTML=html;
}

init();

</script>

</body>
</html>
