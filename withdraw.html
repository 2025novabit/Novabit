<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdrawal | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;font-size:18px}
.container{padding:20px}
#searchInput{width:100%;padding:8px;border-radius:5px;border:1px solid #ccc;margin-bottom:10px}
.coin-scroll{display:flex;flex-direction:column;overflow-y:auto;gap:10px;max-height:50vh;padding:10px 0}
.coin-card{background:#fff;border:1px solid #ccc;border-radius:10px;padding:10px;text-align:center;width:100%;cursor:pointer; display:flex; align-items:center; gap:10px}
.coin-card:hover{border-color:#4b49ac}
.coin-card img{width:40px;height:40px;margin:0}
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);width:360px;max-height:80%;overflow-y:auto;background:#fff;box-shadow:0 0 15px rgba(0,0,0,.3);padding:20px;transition:.3s;z-index:100;display:none}
.panel.active{display:block}
.close, .back{background:#e74c3c;color:#fff;border:none;padding:6px 10px;border-radius:5px; cursor:pointer;}
.notice{margin-top:10px;font-size:14px;color:#555}
button.main{margin-top:15px;background:#4b49ac;color:#fff;border:none;padding:10px 15px;border-radius:5px;cursor:pointer;width:100%}
select.network,input.amount{width:100%;padding:8px;margin-top:10px;border-radius:5px;border:1px solid #ccc}
button.max-btn{background:#28a745;color:#fff;border:none;padding:8px 12px;margin-top:5px;border-radius:5px;width:100%;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{padding:8px;text-align:left;border-bottom:1px solid #ddd}
th{background:#1a1a2e;color:#fff}
</style>
</head>

<body>

<header>
  <button class="back" onclick="history.back()">Back</button>
  Withdrawal
</header>

<div class="container">
  <h3>Your Balances</h3>
  <input type="text" id="searchInput" placeholder="Search coin...">
  <div class="coin-scroll" id="coinScroll">Loading balances...</div>
</div>

<!-- Withdrawal Panel -->
<div class="panel" id="panel">
  <button class="close" onclick="closePanel()">Close</button>
  <h3 id="panelTitle">Coin Withdrawal</h3>

  <label for="networkSelect">Network:</label>
  <select id="networkSelect" class="network"></select>

  <label for="addressInput">Your Address:</label>
  <input type="text" id="addressInput" placeholder="Enter your address">

  <label for="amountInput">Amount:</label>
  <input type="number" id="amountInput" class="amount" placeholder="0.0">
  <button type="button" class="max-btn" id="maxBtn">Use Max Balance</button>

  <div class="notice">
    The requested amount will be locked in your wallet until processed.
  </div>

  <button class="main" onclick="submitWithdrawal()">Submit Withdrawal</button>

  <h3>Withdrawal History</h3>
  <table>
    <thead>
      <tr><th>Date</th><th>Coin</th><th>Network</th><th>Amount</th><th>Status</th></tr>
    </thead>
    <tbody id="historyBody">
      <tr><td colspan="5">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA';

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userId = null;
let wallets = {};
let selectedCoin = null;

const coinScroll = document.getElementById('coinScroll');
const panel = document.getElementById('panel');
const panelTitle = document.getElementById('panelTitle');
const networkSelect = document.getElementById('networkSelect');
const addressInput = document.getElementById('addressInput');
const amountInput = document.getElementById('amountInput');
const maxBtn = document.getElementById('maxBtn');
const historyBody = document.getElementById('historyBody');
const searchInput = document.getElementById('searchInput');

async function init(){
  const { data } = await supabase.auth.getSession();
  if(!data.session){
    alert("Login required"); return;
  }
  userId = data.session.user.id;
  await loadWallets();
  await loadHistory();
}

window.onload = init;

async function loadWallets(){
  const { data, error } = await supabase.from('wallets').select('*').eq('user_id', userId);
  if(error){ coinScroll.innerHTML='Failed to load balances'; return;}
  wallets = {};
  data.forEach(w=>{ if(Number(w.balance) > 0) wallets[w.coin_symbol] = Number(w.balance); });
  renderCoins();
}

function renderCoins(){
  coinScroll.innerHTML='';
  Object.keys(wallets).forEach(symbol=>{
    const div = document.createElement('div');
    div.className='coin-card';
    div.innerHTML=`<b>${symbol}</b> <small>Balance: ${wallets[symbol]}</small>`;
    div.onclick=()=>openPanel(symbol);
    coinScroll.appendChild(div);
  });
}

searchInput.addEventListener('input', ()=>{
  const q = searchInput.value.toLowerCase();
  const filtered = Object.keys(wallets).filter(k=>k.toLowerCase().includes(q));
  coinScroll.innerHTML='';
  filtered.forEach(symbol=>{
    const div = document.createElement('div');
    div.className='coin-card';
    div.innerHTML=`<b>${symbol}</b> <small>Balance: ${wallets[symbol]}</small>`;
    div.onclick=()=>openPanel(symbol);
    coinScroll.appendChild(div);
  });
});

async function openPanel(symbol){
  selectedCoin = symbol;
  panelTitle.innerText = symbol + ' Withdrawal';
  networkSelect.innerHTML='';
  addressInput.value='';
  amountInput.value='';

  // Load networks for selected coin
  const { data, error } = await supabase.from('deposit_wallets')
    .select('*')
    .eq('asset', symbol)
    .eq('is_active', true);
  if(error || data.length===0){
    networkSelect.innerHTML='<option value="">No network available</option>';
  } else {
    data.forEach((n, idx)=>{
      const opt = document.createElement('option');
      opt.value=n.network;
      opt.innerText=n.network;
      networkSelect.appendChild(opt);
    });
  }

  panel.classList.add('active');
}

function closePanel(){ panel.classList.remove('active'); }

maxBtn.addEventListener('click', ()=>{
  if(selectedCoin && wallets[selectedCoin]) amountInput.value = wallets[selectedCoin];
});

async function submitWithdrawal(){
  const network = networkSelect.value;
  const address = addressInput.value.trim();
  const amount = Number(amountInput.value);

  if(!selectedCoin || !network || !address || !amount || amount <= 0) return alert("Fill all fields");

  // Lock wallet
  const { data: walletData, error: wError } = await supabase.from('wallets')
    .select('*').eq('user_id', userId).eq('coin_symbol', selectedCoin).single();
  if(wError || !walletData) return alert("Wallet not found");
  if(walletData.balance < amount) return alert("Insufficient balance");

  const { error:updateError } = await supabase.from('wallets')
    .update({ balance: walletData.balance - amount, locked: walletData.locked + amount })
    .eq('id', walletData.id);
  if(updateError) return alert("Failed to lock wallet");

  // Insert withdrawal request
  const { error: insertError } = await supabase.from('withdrawal_requests')
    .insert({
      user_id: userId,
      coin_symbol: selectedCoin,
      network: network,
      address: address,
      amount: amount,
      status: 'pending',
      created_at: new Date()
    });
  if(insertError) return alert("Failed to submit withdrawal");

  alert("Withdrawal request submitted ✅");
  panel.classList.remove('active');
  await loadWallets();
  await loadHistory();
}

async function loadHistory(){
  const { data, error } = await supabase.from('withdrawal_requests')
    .select('*')
    .eq('user_id', userId)
    .order('created_at', { ascending:false });
  historyBody.innerHTML='';
  if(error || !data || data.length===0){
    historyBody.innerHTML='<tr><td colspan="5">No withdrawals yet</td></tr>';
    return;
  }
  data.forEach(r=>{
    const tr = document.createElement('tr');
    tr.innerHTML=`<td>${new Date(r.created_at).toLocaleString()}</td>
                    <td>${r.coin_symbol}</td>
                    <td>${r.network}</td>
                    <td>${r.amount}</td>
                    <td>${r.status}</td>`;
    historyBody.appendChild(tr);
  });
}
</script>

</body>
</html>
