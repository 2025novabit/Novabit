<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdrawal | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;text-align:center;font-size:18px; display:flex; justify-content:space-between; align-items:center;}
.container{padding:20px}
#searchInput{width:100%;padding:8px;border-radius:5px;border:1px solid #ccc;margin-bottom:10px}
.coin-scroll{display:flex;flex-direction:column;overflow-y:auto;gap:10px;max-height:70vh;padding:10px 0}
.coin-card{background:#fff;border:1px solid #ccc;border-radius:10px;padding:10px;text-align:center;width:100%;cursor:pointer; display:flex; align-items:center; gap:10px}
.coin-card:hover{border-color:#4b49ac}
.coin-card img{width:40px;height:40px;margin:0}
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);width:360px;max-height:80%;overflow-y:auto;background:#fff;box-shadow:0 0 15px rgba(0,0,0,.3);padding:20px;transition:.3s;z-index:100;display:none}
.panel.active{display:block}
.close, .back{background:#e74c3c;color:#fff;border:none;padding:6px 10px;border-radius:5px; cursor:pointer;}
.input-group{margin-top:10px}
input, select{width:100%;padding:8px;border-radius:5px;border:1px solid #ccc}
button.main{margin-top:15px;background:#4b49ac;color:#fff;border:none;padding:10px 15px;border-radius:5px;cursor:pointer}
button.max-btn{background:#28a745;color:#fff;border:none;padding:8px;margin-top:5px;width:100%;border-radius:5px;cursor:pointer}
</style>
</head>

<body>

<header>
  <button class="back" onclick="history.back()">Back</button>
  Withdrawal
</header>

<div class="container">
  <h3>Select Coin to Withdraw</h3>
  <input type="text" id="searchInput" placeholder="Search coin...">
  <div class="coin-scroll" id="coinScroll"></div>
</div>

<!-- Withdrawal Panel -->
<div class="panel" id="panel">
  <button class="close" onclick="closePanel()">Close</button>
  <h3 id="panelTitle"></h3>

  <div class="input-group">
    <label>Network</label>
    <select id="networkSelect"></select>
  </div>

  <div class="input-group">
    <label>Amount</label>
    <input type="number" id="amountInput" placeholder="0.0000">
    <button type="button" class="max-btn" id="maxBtn">Use Max Balance</button>
  </div>

  <div class="input-group">
    <label>Withdrawal Address</label>
    <input type="text" id="addressInput" placeholder="Enter your address">
  </div>

  <button class="main" onclick="submitWithdrawal()">Submit Withdrawal Request</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const coinScroll = document.getElementById('coinScroll');
const panel = document.getElementById('panel');
const panelTitle = document.getElementById('panelTitle');
const networkSelect = document.getElementById('networkSelect');
const amountInput = document.getElementById('amountInput');
const addressInput = document.getElementById('addressInput');
const maxBtn = document.getElementById('maxBtn');
const searchInput = document.getElementById('searchInput');

const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA';

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userId = null;
let wallets = {};
let allCoins = [];

// --- Load user and wallets ---
async function init(){
  const { data } = await supabase.auth.getSession();
  if(!data.session) return alert('Login required');
  userId = data.session.user.id;

  await loadWallets();
  await loadCoins();
}
window.onload = init;

async function loadWallets(){
  const { data, error } = await supabase.from('wallets').select('*').eq('user_id', userId);
  if(error) return console.error(error);
  wallets = {};
  data.forEach(w=>{
    if(Number(w.balance)>0) wallets[w.coin_symbol] = Number(w.balance);
  });
}

async function loadCoins(){
  try{
    const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1');
    allCoins = await res.json();
    renderCoins(allCoins);
  } catch(err){
    console.error(err);
    coinScroll.innerHTML = 'Failed to load coins';
  }
}

function renderCoins(coins){
  coinScroll.innerHTML='';
  coins.forEach(c=>{
    const symbol = c.symbol.toUpperCase();
    if(!wallets[symbol]) return; // فقط ارزهایی که موجودی دارند
    const div = document.createElement('div');
    div.className='coin-card';
    div.innerHTML=`<img src="${c.image}" alt="${symbol}"><div><b>${symbol}</b> <small>Balance: ${wallets[symbol]}</small></div>`;
    div.onclick=()=>openPanel(symbol);
    coinScroll.appendChild(div);
  });
}

searchInput.addEventListener('input', ()=>{
  const q = searchInput.value.toLowerCase();
  const filtered = allCoins.filter(c=>{
    const symbol = c.symbol.toLowerCase();
    return symbol.includes(q) || c.name.toLowerCase().includes(q);
  });
  renderCoins(filtered);
});

function openPanel(symbol){
  panelTitle.innerText = symbol + ' Withdrawal';
  networkSelect.innerHTML='';
  addressInput.value='';
  amountInput.value='';

  // Load networks from supabase table
  supabase.from('withdrawal_networks').select('*').eq('asset', symbol).eq('is_active', true)
  .then(({data, error})=>{
    if(error) return console.error(error);
    data.forEach((n, idx)=>{
      const opt = document.createElement('option');
      opt.value=n.network;
      opt.innerText=n.network;
      networkSelect.appendChild(opt);
    });
  });

  // Max button
  maxBtn.onclick=()=>{ amountInput.value = wallets[symbol] || 0; };

  panel.classList.add('active');
}

function closePanel(){ panel.classList.remove('active'); }

async function submitWithdrawal(){
  const coin = panelTitle.innerText.split(' ')[0];
  const network = networkSelect.value;
  const amount = Number(amountInput.value);
  const address = addressInput.value.trim();

  if(!network || !amount || !address) return alert('All fields are required');
  if(amount > wallets[coin]) return alert('Insufficient balance');

  // Lock funds
  const { data: wallet } = await supabase.from('wallets').select('*').eq('user_id', userId).eq('coin_symbol', coin).single();
  await supabase.from('wallets').update({balance: wallet.balance - amount, locked: wallet.locked + amount}).eq('id', wallet.id);

  // Insert withdrawal request
  const { error } = await supabase.from('withdrawal_requests').insert({
    user_id: userId,
    coin_symbol: coin,
    network: network,
    amount: amount,
    address: address,
    status: 'pending',
    created_at: new Date()
  });

  if(error) return alert('Failed to submit withdrawal');

  alert('Withdrawal request submitted ✅');
  panel.classList.remove('active');
  await loadWallets();
  renderCoins(allCoins);
}
</script>

</body>
</html>
