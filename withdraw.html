<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdrawal | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;text-align:center;font-size:18px; display:flex; justify-content:space-between; align-items:center;}
.container{padding:20px}
.coin-scroll{display:flex;flex-direction:column;overflow-y:auto;gap:10px;max-height:35vh;padding:10px 0}
.coin-card{background:#fff;border:1px solid #ccc;border-radius:10px;padding:10px;width:100%;cursor:pointer; display:flex; align-items:center; justify-content:space-between}
.coin-card:hover{border-color:#4b49ac}
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);width:360px;max-height:85%;overflow-y:auto;background:#fff;box-shadow:0 0 15px rgba(0,0,0,.3);padding:20px;z-index:100;display:none}
.panel.active{display:block}
.close, .back{background:#e74c3c;color:#fff;border:none;padding:6px 10px;border-radius:5px; cursor:pointer;}
button.main{margin-top:15px;background:#4b49ac;color:#fff;border:none;padding:10px 15px;border-radius:5px;cursor:pointer;width:100%}
button.max{background:#28a745;margin-top:5px}
button.cancel-btn{background:#e74c3c;color:#fff;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;margin-top:5px}
button.cancel-btn[disabled]{background:#aaa;cursor:not-allowed}
select,input{width:100%;padding:8px;margin-top:10px;border-radius:5px;border:1px solid #ccc}
.notice{margin-top:10px;font-size:14px;color:#555}
table{width:100%;border-collapse:collapse;margin-top:20px;background:#fff;border-radius:5px;overflow:hidden}
th,td{padding:10px;text-align:left;border-bottom:1px solid #ccc;font-size:14px}
th{background:#1a1a2e;color:#fff}
</style>
</head>

<body>

<header>
  <button class="back" onclick="history.back()">Back</button>
  Withdrawal
</header>

<div class="container">
  <h3>Your Balances</h3>
  <div class="coin-scroll" id="coinScroll"></div>

  <h3>Withdrawal History</h3>
  <table id="historyTable">
    <thead>
      <tr>
        <th>Date</th>
        <th>Coin</th>
        <th>Network</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="historyBody">
      <tr><td colspan="6">Loading history...</td></tr>
    </tbody>
  </table>
</div>

<!-- Withdrawal Panel -->
<div class="panel" id="panel">
  <button class="close" onclick="closePanel()">Close</button>
  <h3 id="panelTitle"></h3>

  <label>Network:</label>
  <select id="networkSelect"></select>

  <label>Amount:</label>
  <input type="number" id="amountInput" placeholder="0.0000">
  <button class="max" onclick="useMax()">Use Max Balance</button>

  <div class="notice" id="feeInfo"></div>

  <label>Withdrawal Address:</label>
  <input type="text" id="addressInput" placeholder="Enter address">

  <button class="main" id="submitBtn">Submit Withdrawal Request</button>
  <button class="cancel-btn" id="cancelBtn" disabled>Cancel Withdrawal</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'YOUR_KEY_HERE';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const coinScroll = document.getElementById('coinScroll');
const panel = document.getElementById('panel');
const panelTitle = document.getElementById('panelTitle');
const networkSelect = document.getElementById('networkSelect');
const amountInput = document.getElementById('amountInput');
const addressInput = document.getElementById('addressInput');
const feeInfo = document.getElementById('feeInfo');
const submitBtn = document.getElementById('submitBtn');
const cancelBtn = document.getElementById('cancelBtn');
const historyBody = document.getElementById('historyBody');

let userId;
let selectedWallet;
let walletsData = [];
let currentRequestId = null;

window.onload = async function(){
  const { data } = await supabaseClient.auth.getSession();
  if(!data.session){ alert("Login required"); return; }
  userId = data.session.user.id;
  loadWallets();
  loadHistory();
}

async function loadWallets(){
  coinScroll.innerHTML = "Loading balances...";
  const { data, error } = await supabaseClient
    .from('wallets')
    .select('*')
    .eq('user_id', userId);

  if(error){ coinScroll.innerHTML = "Error loading balances"; return; }

  walletsData = data.filter(w => Number(w.balance) > 0);
  coinScroll.innerHTML = "";

  if(walletsData.length === 0){ coinScroll.innerHTML = "No balance available"; return; }

  walletsData.forEach(wallet=>{
    const div = document.createElement('div');
    div.className = 'coin-card';
    div.innerHTML = `
      <span><b>${wallet.coin_symbol}</b></span>
      <span>Balance: ${Number(wallet.balance).toFixed(8)}</span>
    `;
    div.onclick = ()=> openPanel(wallet);
    coinScroll.appendChild(div);
  });
}

async function openPanel(wallet){
  selectedWallet = wallet;
  currentRequestId = null;
  panelTitle.innerText = wallet.coin_symbol + " Withdrawal";
  amountInput.value = "";
  addressInput.value = "";
  feeInfo.innerText = "";
  submitBtn.disabled = false;
  cancelBtn.disabled = true;

  const { data } = await supabaseClient
    .from('deposit_wallets')
    .select('network')
    .eq('asset', wallet.coin_symbol)
    .eq('is_active', true);

  networkSelect.innerHTML = "";
  if(data && data.length){
    data.forEach(n=>{
      const opt = document.createElement('option');
      opt.value = n.network;
      opt.textContent = n.network;
      networkSelect.appendChild(opt);
    });
  } else networkSelect.innerHTML = "<option>No Network</option>";

  panel.classList.add('active');
}

function closePanel(){ panel.classList.remove('active'); }

function useMax(){
  amountInput.value = selectedWallet.balance;
  calculateFee();
}

amountInput.addEventListener('input', calculateFee);

function calculateFee(){
  const amount = Number(amountInput.value);
  if(!amount) return;
  const fee = amount * 0.0001; // 0.01%
  const receive = amount - fee;
  feeInfo.innerText = "Fee: "+fee.toFixed(8)+" | You Receive: "+receive.toFixed(8);
}

async function submitWithdrawal(){
  const amount = Number(amountInput.value);
  const address = addressInput.value.trim();
  const network = networkSelect.value;

  if(!amount || amount<=0){ alert("Invalid amount"); return; }
  if(amount > selectedWallet.balance){ alert("Insufficient balance"); return; }
  if(!address){ alert("Address required"); return; }
  if(!network){ alert("Select network"); return; }

  const fee = amount * 0.0001;

  // Update wallet
  await supabaseClient.from('wallets')
    .update({
      balance: selectedWallet.balance - amount,
      locked: Number(selectedWallet.locked || 0) + amount
    })
    .eq('id', selectedWallet.id);

  // Insert withdraw request
  const { data, error } = await supabaseClient.from('withdraw_requests')
    .insert({
      user_id: userId,
      coin_symbol: selectedWallet.coin_symbol,
      amount: amount,
      status: "Pending",
      network,
      address,
      created_at: new Date()
    }).select();

  if(error){ alert("Error submitting withdrawal"); return; }

  currentRequestId = data[0].id;
  submitBtn.disabled = true;
  cancelBtn.disabled = false;
  loadWallets();
  loadHistory();
  closePanel();
}

// Cancel withdrawal
cancelBtn.addEventListener('click', async ()=>{
  if(!currentRequestId) return;
  await supabaseClient.from('withdraw_requests')
    .update({status:"Cancelled"})
    .eq('id', currentRequestId);

  cancelBtn.disabled = true;
  submitBtn.disabled = true;
  loadWallets();
  loadHistory();
});

async function loadHistory(){
  const { data, error } = await supabaseClient.from('withdraw_requests')
    .select('*')
    .eq('user_id', userId)
    .order('created_at',{ascending:false});

  historyBody.innerHTML="";
  if(data && data.length>0){
    data.forEach(r=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${new Date(r.created_at).toLocaleString()}</td>
        <td>${r.coin_symbol}</td>
        <td>${r.network||''}</td>
        <td>${Number(r.amount).toFixed(8)}</td>
        <td>${r.status}</td>
        <td>${r.status==='Pending'?'<button class="cancel-btn" onclick="cancelHistory(\\''+r.id+'\\')">Cancel</button>':'-'}</td>
      `;
      historyBody.appendChild(tr);
    });
  } else historyBody.innerHTML = "<tr><td colspan='6'>No history</td></tr>";
}

async function cancelHistory(id){
  await supabaseClient.from('withdraw_requests')
    .update({status:"Cancelled"})
    .eq('id',id);
  loadWallets();
  loadHistory();
}
</script>

</body>
</html>
