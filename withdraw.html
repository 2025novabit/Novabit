<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdrawal | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;text-align:center;font-size:18px; display:flex; justify-content:space-between; align-items:center;}
.container{padding:20px}
#searchInput{width:100%;padding:8px;border-radius:5px;border:1px solid #ccc;margin-bottom:10px}
.coin-scroll{display:flex;flex-direction:column;overflow-y:auto;gap:10px;max-height:70vh;padding:10px 0}
.coin-card{background:#fff;border:1px solid #ccc;border-radius:10px;padding:10px;text-align:center;width:100%;cursor:pointer; display:flex; align-items:center; gap:10px}
.coin-card:hover{border-color:#4b49ac}
.coin-card img{width:40px;height:40px;margin:0}
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);width:360px;max-height:80%;overflow-y:auto;background:#fff;box-shadow:0 0 15px rgba(0,0,0,.3);padding:20px;transition:.3s;z-index:100;display:none}
.panel.active{display:block}
.close, .back{background:#e74c3c;color:#fff;border:none;padding:6px 10px;border-radius:5px; cursor:pointer;}
.notice{margin-top:20px;font-size:14px;color:#555}
button.main{margin-top:15px;background:#4b49ac;color:#fff;border:none;padding:10px 15px;border-radius:5px;cursor:pointer}
button.max-btn{margin-top:5px;width:100%;padding:8px;background:#28a745;color:#fff;border:none;border-radius:5px;cursor:pointer}
select.network,input{width:100%;padding:8px;margin-top:5px;border-radius:5px;border:1px solid #ccc;margin-bottom:10px}
</style>
</head>

<body>

<header>
  <button class="back" onclick="history.back()">Back</button>
  Withdrawal
</header>

<div class="container">
  <h3>Select Coin (Top 100)</h3>
  <input type="text" id="searchInput" placeholder="Search coin...">
  <div class="coin-scroll" id="coinScroll"></div>
</div>

<!-- Withdrawal Panel -->
<div class="panel" id="panel">
  <button class="close" onclick="closePanel()">Close</button>
  <h3 id="panelTitle"></h3>

  <label for="networkSelect">Network:</label>
  <select id="networkSelect" class="network"></select>

  <label>Amount:</label>
  <input type="number" id="amountInput" placeholder="0.0000">
  <button type="button" class="max-btn" id="maxBtn">Use Max Balance</button>

  <label>Withdrawal Address:</label>
  <input type="text" id="addressInput" placeholder="Enter your withdrawal address">

  <div class="notice">
    After filling the fields, please submit your withdrawal request.
  </div>

  <button class="main" onclick="submitWithdrawal()">
    Submit Withdrawal Request
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const coinScroll = document.getElementById('coinScroll');
const panel = document.getElementById('panel');
const panelTitle = document.getElementById('panelTitle');
const networkSelect = document.getElementById('networkSelect');
const amountInput = document.getElementById('amountInput');
const addressInput = document.getElementById('addressInput');
const maxBtn = document.getElementById('maxBtn');
const searchInput = document.getElementById('searchInput');

const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA';

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allCoins = [];
let userBalances = {};
let userId = null;
let currentSymbol = null;

// format balance
function formatBalance(balance){
  return Number(balance).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 8});
}

// load user and balances
async function loadUserBalances(){
  const { data: sessionData } = await supabase.auth.getSession();
  if(!sessionData.session){
    location.href = 'login.html';
    return {};
  }
  userId = sessionData.session.user.id;

  const { data, error } = await supabase
    .from('wallets')
    .select('coin_symbol,balance')
    .eq('user_id', userId);

  if(error) { console.error(error); return {}; }

  const balances = {};
  data.forEach(w => { balances[w.coin_symbol] = Number(w.balance) || 0; });
  return balances;
}

// load coins from coingecko
async function loadCoins(){
  userBalances = await loadUserBalances();
  try{
    const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1');
    const data = await res.json();
    allCoins = data;
    renderCoins(data);
  } catch(err){
    console.error(err);
    coinScroll.innerHTML = 'Failed to load coins';
  }
}

function renderCoins(coins){
  coinScroll.innerHTML = '';
  coins.forEach(c=>{
    const symbol = c.symbol.toUpperCase();
    if(!userBalances[symbol] || userBalances[symbol] <= 0) return; // فقط ارزهای موجودی >0
    const div = document.createElement('div');
    div.className = 'coin-card';
    div.innerHTML = `
      <img src="${c.image}" alt="${symbol}">
      <div><b>${symbol}</b> <small>Balance: <b>${formatBalance(userBalances[symbol])}</b></small></div>
    `;
    div.onclick = ()=>openPanel(symbol);
    coinScroll.appendChild(div);
  });
}

searchInput.addEventListener('input', ()=>{
  const query = searchInput.value.toLowerCase();
  const filtered = allCoins.filter(c=>c.symbol.toLowerCase().includes(query) || c.name.toLowerCase().includes(query));
  renderCoins(filtered);
});

function openPanel(symbol){
  currentSymbol = symbol;
  panelTitle.innerText = symbol + ' Withdrawal';
  networkSelect.innerHTML = '';
  amountInput.value = '';
  addressInput.value = '';

  fetch(`${SUPABASE_URL}/rest/v1/deposit_wallets?asset=eq.${symbol}&is_active=eq.true`, {
    headers:{
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY
    }
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.length>0){
      data.forEach((w, idx)=>{
        const opt = document.createElement('option');
        opt.value = w.network;
        opt.innerText = w.network;
        networkSelect.appendChild(opt);
      });
    }
  })
  .catch(console.error);

  panel.classList.add('active');
}

closePanel = ()=>panel.classList.remove('active');

maxBtn.addEventListener('click', ()=>{
  if(!currentSymbol) return;
  amountInput.value = userBalances[currentSymbol];
});

// ثبت برداشت
async function submitWithdrawal(){
  const amount = Number(amountInput.value);
  const network = networkSelect.value;
  const address = addressInput.value;

  if(!amount || !network || !address) return alert('Please fill all fields');
  if(amount > userBalances[currentSymbol]) return alert('Insufficient balance');

  // بروزرسانی موجودی و قفل
  const { data: wallet } = await supabase.from('wallets')
    .select('*').eq('user_id', userId).eq('coin_symbol', currentSymbol).single();

  if(!wallet) return alert('Wallet not found');

  const { error: updateErr } = await supabase.from('wallets')
    .update({
      balance: wallet.balance - amount,
      locked: wallet.locked + amount
    })
    .eq('id', wallet.id);

  if(updateErr) return alert('Failed to lock wallet');

  // درج درخواست برداشت
  const { error } = await supabase.from('withdrawal_requests')
    .insert({
      user_id: userId,
      coin_symbol: currentSymbol,
      network: network,
      amount: amount,
      address: address,
      status: 'pending',
      created_at: new Date()
    });

  if(error) return alert('Failed to submit withdrawal');

  alert('Withdrawal request submitted ✅');
  panel.classList.remove('active');
  userBalances[currentSymbol] -= amount;
  renderCoins(allCoins);
}

loadCoins();
</script>

</body>
</html>
