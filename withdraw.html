<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdrawal Request | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;font-size:18px}
.container{padding:20px}
label{display:block;margin-top:12px;font-size:14px}
select,input{width:100%;padding:8px;margin-top:5px;border-radius:5px;border:1px solid #ccc}
button{margin-top:12px;width:100%;padding:10px;background:#4b49ac;color:#fff;border:none;border-radius:5px;cursor:pointer}
button.max-btn{background:#28a745;margin-top:5px;width:100%}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{padding:8px;text-align:left;border-bottom:1px solid #ddd}
th{background:#1a1a2e;color:#fff}
.back{background:#e74c3c;width:auto;padding:6px 12px}
</style>
</head>
<body>

<header>
  <button class="back" onclick="history.back()">Back</button>
  Withdrawal Request
</header>

<div class="container">
  <label>Coin</label>
  <select id="coinSelect"></select>

  <label>Network</label>
  <select id="networkSelect"></select>

  <label>Amount</label>
  <input type="number" id="amountInput" placeholder="Enter amount">
  <button type="button" class="max-btn" id="maxBtn">Use Max Balance</button>

  <button onclick="submitRequest()">Submit Request</button>

  <div class="card">
    <h2>Withdrawal History</h2>
    <table>
      <thead>
        <tr><th>Date</th><th>Coin</th><th>Network</th><th>Amount</th><th>Status</th></tr>
      </thead>
      <tbody id="historyBody">
        <tr><td colspan="5">No withdrawals yet</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA';

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth:{persistSession:true, autoRefreshToken:true, detectSessionInUrl:true}
});

let userId = null;
let wallets = {};
const coinSelect = document.getElementById('coinSelect');
const networkSelect = document.getElementById('networkSelect');
const amountInput = document.getElementById('amountInput');
const historyBody = document.getElementById('historyBody');

async function init(){
  const { data } = await supabase.auth.getSession();
  if(!data.session){
    location.href='login.html';
    return;
  }
  userId = data.session.user.id;
  await loadWallets();
  await loadNetworks();
  await loadHistory();
}
window.onload = init;

async function loadWallets(){
  const { data, error } = await supabase.from('wallets').select('*').eq('user_id', userId);
  if(error) return alert('Failed to load wallets');
  wallets = {};
  data.forEach(w=>{
    if(Number(w.balance)>0) wallets[w.coin_symbol] = Number(w.balance);
  });

  coinSelect.innerHTML='';
  Object.keys(wallets).forEach(c=>{
    const opt = document.createElement('option');
    opt.value=c;
    opt.innerText=c;
    coinSelect.appendChild(opt);
  });
}

async function loadNetworks(){
  networkSelect.innerHTML='';
  if(!coinSelect.value) return;
  const { data, error } = await supabase.from('deposit_wallets')
    .select('network')
    .eq('asset', coinSelect.value)
    .eq('is_active', true);
  if(error) return;
  data.forEach(n=>{
    const opt=document.createElement('option');
    opt.value=n.network;
    opt.innerText=n.network;
    networkSelect.appendChild(opt);
  });
}

coinSelect.addEventListener('change', loadNetworks);

document.getElementById('maxBtn').addEventListener('click', function(){
  const coin = coinSelect.value;
  if(!coin || !wallets[coin]) return alert("No balance");
  amountInput.value = wallets[coin];
});

async function submitRequest(){
  const coin = coinSelect.value;
  const network = networkSelect.value;
  const amount = Number(amountInput.value);

  if(!coin || !network || !amount || amount<=0) return alert('Please fill all fields');

  // Lock amount in wallet
  const { data: wallet } = await supabase.from('wallets')
    .select('*').eq('user_id', userId).eq('coin_symbol', coin).single();

  if(!wallet) return alert('Wallet not found');
  if(wallet.balance < amount) return alert('Insufficient balance');

  const { error: updateError } = await supabase.from('wallets')
    .update({
      balance: wallet.balance - amount,
      locked: wallet.locked + amount
    })
    .eq('id', wallet.id);

  if(updateError) return alert('Failed to lock wallet');

  // Insert withdrawal request
  const { error } = await supabase.from('withdrawal_requests')
    .insert({
      user_id: userId,
      coin_symbol: coin,
      network: network,
      amount: amount,
      status: 'pending',
      created_at: new Date()
    });

  if(error) return alert('Failed to submit withdrawal');

  alert('Withdrawal request submitted ✅');
  amountInput.value='';
  await loadWallets();
  await loadHistory();
}

async function loadHistory(){
  const { data } = await supabase.from('withdrawal_requests')
    .select('*')
    .eq('user_id', userId)
    .order('created_at',{ascending:false});

  historyBody.innerHTML='';
  if(!data || data.length===0){
    historyBody.innerHTML='<tr><td colspan="5">No withdrawals yet</td></tr>';
    return;
  }

  data.forEach(r=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${new Date(r.created_at).toLocaleString()}</td>
                    <td>${r.coin_symbol}</td>
                    <td>${r.network}</td>
                    <td>${r.amount}</td>
                    <td>${r.status}</td>`;
    historyBody.appendChild(tr);
  });
}
</script>
</body>
</html>
