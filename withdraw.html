<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdrawal | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;text-align:center;font-size:18px; display:flex; justify-content:space-between; align-items:center;}
.container{padding:20px}
#searchInput{width:100%;padding:8px;border-radius:5px;border:1px solid #ccc;margin-bottom:10px}
.coin-scroll{display:flex;flex-direction:column;overflow-y:auto;gap:10px;max-height:50vh;padding:10px 0}
.coin-card{background:#fff;border:1px solid #ccc;border-radius:10px;padding:10px;text-align:center;width:100%;cursor:pointer; display:flex; align-items:center; gap:10px}
.coin-card:hover{border-color:#4b49ac}
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);width:360px;max-height:80%;overflow-y:auto;background:#fff;box-shadow:0 0 15px rgba(0,0,0,.3);padding:20px;transition:.3s;z-index:100;display:none}
.panel.active{display:block}
.close, .back{background:#e74c3c;color:#fff;border:none;padding:6px 10px;border-radius:5px; cursor:pointer;}
input, select{width:100%;padding:8px;margin-top:10px;border-radius:5px;border:1px solid #ccc}
button.main{margin-top:15px;background:#4b49ac;color:#fff;border:none;padding:10px 15px;border-radius:5px;cursor:pointer}
button.max-btn{background:#888;color:#fff;border:none;padding:6px 10px;margin-left:5px;border-radius:5px;cursor:pointer}
button.cancel-btn{background:#e74c3c;color:#fff;border:none;padding:5px 10px;border-radius:4px;cursor:pointer}
button.cancel-btn[disabled]{background:#aaa;cursor:not-allowed}
table{width:100%;border-collapse:collapse;margin-top:20px;background:#fff;border-radius:5px;overflow:hidden}
th,td{padding:10px;text-align:left;border-bottom:1px solid #ccc;font-size:14px}
th{background:#1a1a2e;color:#fff}
</style>
</head>
<body>

<header>
  <button class="back" onclick="history.back()">Back</button>
  Withdrawal
</header>

<div class="container">
  <h3>Your Balances</h3>
  <input type="text" id="searchInput" placeholder="Search coin...">
  <div class="coin-scroll" id="coinScroll"></div>

  <h3>Withdrawal History</h3>
  <table id="historyTable">
    <thead>
      <tr>
        <th>Date</th>
        <th>Coin</th>
        <th>Network</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="historyBody">
      <tr><td colspan="6">Loading history...</td></tr>
    </tbody>
  </table>
</div>

<!-- Withdrawal Panel -->
<div class="panel" id="panel">
  <button class="close" onclick="closePanel()">Close</button>
  <h3 id="panelTitle"></h3>

  <label>Network:</label>
  <select id="networkSelect"></select>

  <label>Amount:</label>
  <div style="display:flex;align-items:center">
    <input type="number" id="amountInput" placeholder="0.0000">
    <button class="max-btn" id="maxBtn">Max</button>
  </div>

  <label>Withdrawal Address:</label>
  <input type="text" id="addressInput" placeholder="Enter your address">

  <div class="notice" id="feeNotice"></div>

  <button class="main" id="submitBtn">Submit Withdrawal</button>
  <button class="main" id="cancelBtn">Cancel Withdrawal</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const coinScroll = document.getElementById('coinScroll');
const searchInput = document.getElementById('searchInput');
const panel = document.getElementById('panel');
const panelTitle = document.getElementById('panelTitle');
const networkSelect = document.getElementById('networkSelect');
const amountInput = document.getElementById('amountInput');
const addressInput = document.getElementById('addressInput');
const maxBtn = document.getElementById('maxBtn');
const feeNotice = document.getElementById('feeNotice');
const submitBtn = document.getElementById('submitBtn');
const cancelBtn = document.getElementById('cancelBtn');
const historyBody = document.getElementById('historyBody');

let userId = null;
let userBalances = {};
let currentCoin = '';
let currentBalance = 0;
let currentRequestId = null;

// Format balance
const fmt = b => Number(b).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:8});

// Load user session and balances
async function loadBalances(){
  const { data: sessionData } = await supabase.auth.getSession();
  if(!sessionData.session) { alert('User not logged in'); return; }
  userId = sessionData.session.user.id;

  const { data, error } = await supabase.from('wallets')
    .select('coin_symbol,balance')
    .eq('user_id',userId);

  if(error){ console.error(error); return; }

  userBalances = {};
  data.forEach(w => { if(Number(w.balance)>0) userBalances[w.coin_symbol] = Number(w.balance); });
  renderCoins(Object.keys(userBalances));
  loadHistory();
}

function renderCoins(coins){
  coinScroll.innerHTML='';
  if(coins.length===0){ coinScroll.innerHTML='No coins'; return; }
  coins.forEach(sym=>{
    const div = document.createElement('div');
    div.className='coin-card';
    div.innerHTML=`<b>${sym}</b> Balance: ${fmt(userBalances[sym])}`;
    div.onclick=()=>openPanel(sym);
    coinScroll.appendChild(div);
  });
}

searchInput.addEventListener('input',()=>{
  const q = searchInput.value.toUpperCase();
  renderCoins(Object.keys(userBalances).filter(s=>s.includes(q)));
});

// Open panel
async function openPanel(symbol){
  currentCoin = symbol;
  currentBalance = userBalances[symbol];
  panelTitle.innerText = symbol + ' Withdrawal';
  amountInput.value='';
  addressInput.value='';
  feeNotice.innerText='';
  currentRequestId=null;
  submitBtn.disabled=false;
  cancelBtn.disabled=false;

  networkSelect.innerHTML='';
  const { data, error } = await supabase.from('deposit_wallets')
    .select('network,address')
    .eq('asset',symbol)
    .eq('is_active',true);

  if(data && data.length>0){
    data.forEach((w,idx)=>{
      const opt = document.createElement('option');
      opt.value = w.network;
      opt.innerText = w.network;
      networkSelect.appendChild(opt);
      if(idx===0) feeNotice.innerText = `Fee: ${(currentBalance*0.01).toFixed(8)}`;
    });
  }else{
    const opt = document.createElement('option');
    opt.value='';
    opt.innerText='No network';
    networkSelect.appendChild(opt);
  }

  panel.classList.add('active');
}

// Max button
maxBtn.onclick=()=>{ amountInput.value=currentBalance.toFixed(8); feeNotice.innerText=`Fee: ${(currentBalance*0.01).toFixed(8)}`; }

// Submit withdrawal
submitBtn.onclick=async()=>{
  const amount = Number(amountInput.value);
  const address = addressInput.value.trim();
  const network = networkSelect.value;
  if(!amount || amount>currentBalance){ alert('Invalid amount'); return; }
  if(!address){ alert('Enter address'); return; }
  if(!network){ alert('Select network'); return; }

  const finalAmount = amount - (amount*0.01);

  const { data, error } = await supabase.from('withdraw_requests').insert([{
    user_id,
    coin_symbol: currentCoin,
    amount: finalAmount,
    network,
    address,
    status:'Pending'
  }]).select();

  if(error){ alert('Error submitting withdrawal'); console.error(error); return; }

  currentRequestId = data[0].id;
  userBalances[currentCoin]-=amount;
  renderCoins(Object.keys(userBalances));
  loadHistory();
  submitBtn.disabled=true;
  cancelBtn.disabled=false;
}

// Cancel withdrawal
cancelBtn.onclick=async()=>{
  if(!currentRequestId) return;
  const { data, error } = await supabase.from('withdraw_requests')
    .update({ status:'Cancelled' })
    .eq('id',currentRequestId)
    .select();
  if(error){ alert('Error cancelling'); console.error(error); return; }
  cancelBtn.disabled=true;
  submitBtn.disabled=true;
  loadHistory();
}

function closePanel(){ panel.classList.remove('active'); }

// Load history
async function loadHistory(){
  if(!userId) return;
  const { data, error } = await supabase.from('withdraw_requests')
    .select('*')
    .eq('user_id',userId)
    .order('created_at',{ascending:false});

  historyBody.innerHTML='';
  if(data && data.length>0){
    data.forEach(r=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td>${new Date(r.created_at).toLocaleString()}</td>
        <td>${r.coin_symbol}</td>
        <td>${r.network||''}</td>
        <td>${fmt(r.amount)}</td>
        <td>${r.status}</td>
        <td>${r.status==='Pending'?'<button class="cancel-btn" onclick="cancelRequest(\\''+r.id+'\\')">Cancel</button>':'-'}</td>
      `;
      historyBody.appendChild(tr);
    });
  }else historyBody.innerHTML='<tr><td colspan="6">No withdrawals</td></tr>';
}

async function cancelRequest(id){
  const { data, error } = await supabase.from('withdraw_requests')
    .update({ status:'Cancelled' })
    .eq('id',id)
    .select();
  if(error){ console.error(error); return; }
  loadBalances();
}

// Initial load
loadBalances();
</script>
</body>
</html>
