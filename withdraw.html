<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdraw Request | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;text-align:center;font-size:18px}
.container{padding:20px}
label{display:block;margin-top:12px}
select,input{width:100%;padding:8px;margin-top:5px;border-radius:5px;border:1px solid #ccc}
button{margin-top:15px;width:100%;padding:10px;background:#4b49ac;color:#fff;border:none;border-radius:5px;cursor:pointer}
button:hover{background:#3a3690}
.table-container{margin-top:25px;background:#fff;padding:15px;border-radius:5px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;text-align:left;border-bottom:1px solid #eee}
th{background:#1a1a2e;color:#fff}
.max-btn{background:#28a745;margin-top:5px}
</style>
</head>
<body>

<header>Withdraw Request</header>

<div class="container">

<label>Coin</label>
<select id="coinSelect"></select>

<label>Amount</label>
<input type="number" id="amountInput" placeholder="Enter amount">
<button class="max-btn" onclick="useMax()">Use Max</button>

<label>Address</label>
<input type="text" id="addressInput" placeholder="Withdrawal address">

<button onclick="submitWithdraw()">Submit Withdraw</button>

<div class="table-container">
<h3>Withdraw History</h3>
<table>
<thead>
<tr>
<th>Date</th>
<th>Coin</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>
<tbody id="historyBody">
<tr><td colspan="4">No withdraws yet</td></tr>
</tbody>
</table>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA';

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user;
let wallets = {};  // structure: { coin: {balance, locked} }

/* ================= INIT ================= */
async function init(){
  const { data:{ session } } = await supabase.auth.getSession();
  if(!session){
    alert("Login required");
    return;
  }
  user = session.user;

  await loadWallets();
  await loadHistory();
}

window.onload = init;

/* ================= LOAD ALL WALLET COINS ================= */
async function loadWallets(){

  const { data, error } = await supabase
    .from("wallets")
    .select("coin_symbol,balance,locked")
    .eq("user_id", user.id);

  if(error){
    alert("Wallet load error");
    return;
  }

  wallets = {};
  const coinSelect = document.getElementById("coinSelect");
  coinSelect.innerHTML = "";

  data.forEach(w=>{
    wallets[w.coin_symbol] = {
      balance: Number(w.balance),
      locked: Number(w.locked || 0)
    };
    const opt = document.createElement("option");
    opt.value = w.coin_symbol;
    opt.innerText = `${w.coin_symbol} (Available: ${w.balance})`;
    coinSelect.appendChild(opt);
  });

}

/* ================= USE MAX ================= */
function useMax(){
  const coin = document.getElementById("coinSelect").value;
  if(!coin || !wallets[coin]){
    alert("No balance");
    return;
  }
  document.getElementById("amountInput").value = wallets[coin].balance;
}

/* ================= SUBMIT WITHDRAW ================= */
async function submitWithdraw(){

  const coin = document.getElementById("coinSelect").value;
  const amount = Number(document.getElementById("amountInput").value);
  const address = document.getElementById("addressInput").value;

  if(!coin || !amount || amount <=0 || !address){
    alert("All fields required");
    return;
  }

  if(wallets[coin].balance < amount){
    alert("Insufficient balance");
    return;
  }

  // ثبت درخواست برداشت
  const { error: insertError } = await supabase
    .from("withdraw_requests")
    .insert({
      user_id: user.id,
      asset: coin,
      amount: amount,
      address: address,
      status: "pending",
      created_at: new Date()
    });

  if(insertError){
    alert("Withdraw insert failed");
    return;
  }

  // قفل کردن موجودی
  const newBalance = wallets[coin].balance - amount;
  const newLocked = wallets[coin].locked + amount;

  const { error: updateError } = await supabase
    .from("wallets")
    .update({ balance: newBalance, locked: newLocked })
    .eq("user_id", user.id)
    .eq("coin_symbol", coin);

  if(updateError){
    alert("Wallet lock failed");
    return;
  }

  alert("Withdraw request submitted ✅");

  document.getElementById("amountInput").value = "";
  document.getElementById("addressInput").value = "";

  await loadWallets();
  await loadHistory();
}

/* ================= LOAD HISTORY ================= */
async function loadHistory(){
  const { data } = await supabase
    .from("withdraw_requests")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at",{ascending:false});

  const body = document.getElementById("historyBody");
  body.innerHTML="";

  if(!data || data.length===0){
    body.innerHTML='<tr><td colspan="4">No withdraws yet</td></tr>';
    return;
  }

  data.forEach(r=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${new Date(r.created_at).toLocaleString()}</td>
      <td>${r.asset}</td>
      <td>${r.amount}</td>
      <td>${r.status}</td>
    `;
    body.appendChild(tr);
  });
}
</script>
</body>
</html>
