<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdrawal | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;text-align:center;font-size:18px; display:flex; justify-content:space-between; align-items:center;}
.container{padding:20px}
.coin-scroll{display:flex;flex-direction:column;overflow-y:auto;gap:10px;max-height:70vh;padding:10px 0}
.coin-card{background:#fff;border:1px solid #ccc;border-radius:10px;padding:10px;text-align:center;width:100%;cursor:pointer; display:flex; align-items:center; gap:10px}
.coin-card:hover{border-color:#4b49ac}
.coin-card img{width:40px;height:40px;margin:0}
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);width:360px;max-height:80%;overflow-y:auto;background:#fff;box-shadow:0 0 15px rgba(0,0,0,.3);padding:20px;transition:.3s;z-index:100;display:none}
.panel.active{display:block}
.close, .back{background:#e74c3c;color:#fff;border:none;padding:6px 10px;border-radius:5px; cursor:pointer;}
.address{background:#f1f1f1;padding:10px;border-radius:5px;font-family:monospace;margin-top:10px; display:flex; justify-content:space-between; align-items:center;}
.notice{margin-top:20px;font-size:14px;color:#555}
button.main{margin-top:15px;background:#4b49ac;color:#fff;border:none;padding:10px 15px;border-radius:5px;cursor:pointer}
select.network{width:100%;padding:8px;margin-top:10px;border-radius:5px;border:1px solid #ccc}
input.amount{width:100%;padding:8px;margin-top:10px;border-radius:5px;border:1px solid #ccc}
button.max-btn{background:#28a745;margin-top:8px;width:100%;padding:8px;color:#fff;border:none;border-radius:5px;cursor:pointer}
</style>
</head>
<body>

<header>
  <button class="back" onclick="history.back()">Back</button>
  Withdrawal
</header>

<div class="container">
  <h3>Your Balances</h3>
  <div class="coin-scroll" id="coinScroll">Loading balances...</div>
</div>

<!-- Withdrawal Panel -->
<div class="panel" id="panel">
  <button class="close" onclick="closePanel()">Close</button>
  <h3 id="panelTitle"></h3>

  <label for="networkSelect">Network:</label>
  <select id="networkSelect" class="network"></select>

  <label for="amountInput">Amount:</label>
  <input type="number" id="amountInput" class="amount" placeholder="Enter amount">
  <button type="button" class="max-btn" id="maxBtn">Use Max Balance</button>

  <div class="address" id="userAddress">
    <span>—</span>
    <button onclick="copyAddress()" style="background:#4b49ac;color:#fff;border:none;padding:5px 8px;border-radius:4px;cursor:pointer">Copy</button>
  </div>

  <div class="notice">
    After confirming, your withdrawal request will be submitted.
  </div>

  <button class="main" onclick="submitRequest()">Submit Withdrawal Request</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA';

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const coinScroll = document.getElementById('coinScroll');
const panel = document.getElementById('panel');
const panelTitle = document.getElementById('panelTitle');
const networkSelect = document.getElementById('networkSelect');
const amountInput = document.getElementById('amountInput');
const maxBtn = document.getElementById('maxBtn');
const userAddress = document.getElementById('userAddress');

let userBalances = {};
let selectedCoin = null;

function formatBalance(balance){
  return Number(balance).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:8});
}

async function loadBalances(){
  const { data: auth } = await supabase.auth.getSession();
  if(!auth.session){ location.href='login.html'; return; }
  const userId = auth.session.user.id;

  const { data, error } = await supabase.from('wallets')
    .select('coin_symbol,balance,locked')
    .eq('user_id', userId);
  if(error){ console.error(error); coinScroll.innerHTML='Failed to load balances'; return; }

  userBalances = {};
  coinScroll.innerHTML='';
  data.forEach(w=>{
    const symbol = w.coin_symbol.toUpperCase();
    const balance = Number(w.balance);
    if(balance>0){
      userBalances[symbol] = balance;
      const div = document.createElement('div');
      div.className='coin-card';
      div.innerHTML = `<div><b>${symbol}</b> Balance: ${formatBalance(balance)}</div>`;
      div.onclick = ()=>openPanel(symbol, userId);
      coinScroll.appendChild(div);
    }
  });

  if(Object.keys(userBalances).length===0) coinScroll.innerHTML='No balance available';
}

async function openPanel(symbol, userId){
  selectedCoin = symbol;
  panelTitle.innerText = symbol + ' Withdrawal';
  amountInput.value='';
  networkSelect.innerHTML='';
  userAddress.querySelector('span').innerText='Loading...';

  // بارگذاری شبکه‌های فعال
  const { data } = await supabase.from('deposit_wallets')
    .select('*').eq('asset', symbol).eq('is_active', true);

  if(data.length>0){
    data.forEach((n, idx)=>{
      const opt = document.createElement('option');
      opt.value = n.network;
      opt.innerText = n.network;
      networkSelect.appendChild(opt);
      if(idx===0) userAddress.querySelector('span').innerText = n.address;
    });
    networkSelect.onchange = ()=>{
      const sel = data.find(d=>d.network===networkSelect.value);
      userAddress.querySelector('span').innerText = sel.address;
    };
  } else userAddress.querySelector('span').innerText='No network available';

  maxBtn.onclick = ()=>{ amountInput.value = userBalances[selectedCoin] || 0; };

  panel.classList.add('active');
}

function closePanel(){ panel.classList.remove('active'); }
function copyAddress(){ navigator.clipboard.writeText(userAddress.querySelector('span').innerText).then(()=>alert('Copied')); }

async function submitRequest(){
  const { data: auth } = await supabase.auth.getSession();
  if(!auth.session) return alert('Not logged in');
  const userId = auth.session.user.id;
  const amount = Number(amountInput.value);
  const network = networkSelect.value;

  if(!selectedCoin || !network || !amount || amount<=0) return alert('Fill all fields');

  const { data: wallet } = await supabase.from('wallets')
    .select('*').eq('user_id', userId).eq('coin_symbol', selectedCoin).single();
  if(!wallet) return alert('Wallet not found');
  if(wallet.balance < amount) return alert('Insufficient balance');

  // قفل کردن موجودی
  await supabase.from('wallets')
    .update({ balance: wallet.balance - amount, locked: wallet.locked + amount })
    .eq('id', wallet.id);

  // ثبت درخواست برداشت
  const { error } = await supabase.from('withdrawal_requests')
    .insert({
      user_id: userId,
      coin_symbol: selectedCoin,
      network: network,
      amount: amount,
      status: 'pending',
      created_at: new Date()
    });
  if(error) return alert('Failed to submit withdrawal');

  alert('Withdrawal request submitted ✅');
  closePanel();
  loadBalances();
}

loadBalances();
</script>
</body>
</html>
