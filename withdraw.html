<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdrawal | Novabit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{background:#1a1a2e;color:#fff;padding:15px;text-align:center;font-size:18px; display:flex; justify-content:space-between; align-items:center;}
.container{padding:20px}
.coin-scroll{display:flex;flex-direction:column;overflow-y:auto;gap:10px;max-height:60vh;padding:10px 0}
.coin-card{background:#fff;border:1px solid #ccc;border-radius:10px;padding:10px;width:100%;cursor:pointer; display:flex; align-items:center; justify-content:space-between}
.coin-card:hover{border-color:#4b49ac}
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);width:360px;max-height:85%;overflow-y:auto;background:#fff;box-shadow:0 0 15px rgba(0,0,0,.3);padding:20px;z-index:100;display:none}
.panel.active{display:block}
.close, .back{background:#e74c3c;color:#fff;border:none;padding:6px 10px;border-radius:5px; cursor:pointer;}
button.main{margin-top:15px;background:#4b49ac;color:#fff;border:none;padding:10px 15px;border-radius:5px;cursor:pointer;width:100%}
button.max{background:#28a745;margin-top:5px}
button.cancel{background:#dc3545;padding:4px 8px;border:none;border-radius:5px;color:#fff;cursor:pointer}
select,input{width:100%;padding:8px;margin-top:10px;border-radius:5px;border:1px solid #ccc}
.notice{margin-top:10px;font-size:14px;color:#555}
.history{margin-top:30px}
.history-item{background:#fff;border:1px solid #ccc;border-radius:8px;padding:10px;margin-bottom:10px}
</style>
</head>

<body>

<header>
  <button class="back" onclick="history.back()">Back</button>
  Withdrawal
</header>

<div class="container">
  <h3>Select Coin</h3>
  <div class="coin-scroll" id="coinScroll"></div>

  <!-- Withdrawal History -->
  <div class="history">
    <h3>Withdrawal History</h3>
    <div id="historyList">Loading history...</div>
  </div>
</div>

<!-- Withdrawal Panel -->
<div class="panel" id="panel">
  <button class="close" onclick="closePanel()">Close</button>
  <h3 id="panelTitle"></h3>

  <label>Network:</label>
  <select id="networkSelect"></select>

  <label>Amount:</label>
  <input type="number" id="amountInput" placeholder="0.0000">
  <button class="max" onclick="useMax()">Use Max Balance</button>

  <div class="notice" id="feeInfo"></div>

  <label>Withdrawal Address:</label>
  <input type="text" id="addressInput" placeholder="Enter address">

  <button class="main" onclick="submitWithdrawal()">
    Submit Withdrawal Request
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const coinScroll = document.getElementById('coinScroll');
const panel = document.getElementById('panel');
const panelTitle = document.getElementById('panelTitle');
const networkSelect = document.getElementById('networkSelect');
const historyList = document.getElementById('historyList');

let userId;
let selectedWallet;
let walletsData = [];

window.onload = async function(){
  const { data } = await supabaseClient.auth.getSession();
  if(!data.session){ alert("Login required"); return; }
  userId = data.session.user.id;
  loadWallets();
  loadHistory();
}

async function loadWallets(){
  coinScroll.innerHTML = "Loading balances...";

  const { data } = await supabaseClient
    .from('wallets')
    .select('*')
    .eq('user_id', userId);

  walletsData = data.filter(w => Number(w.balance) > 0);

  if(walletsData.length === 0){
    coinScroll.innerHTML = "No balance available";
    return;
  }

  coinScroll.innerHTML = "";

  walletsData.forEach(wallet=>{
    const div = document.createElement('div');
    div.className = 'coin-card';
    div.innerHTML = `
      <span><b>${wallet.coin_symbol}</b></span>
      <span>Balance: ${Number(wallet.balance).toFixed(8)}</span>
    `;
    div.onclick = ()=> openPanel(wallet);
    coinScroll.appendChild(div);
  });
}

async function loadHistory(){
  const { data } = await supabaseClient
    .from('withdraw_requests')
    .select('*')
    .eq('user_id', userId)
    .order('created_at', {ascending:false});

  if(!data || data.length===0){
    historyList.innerHTML = "No withdrawals yet";
    return;
  }

  historyList.innerHTML = "";

  data.forEach(row=>{
    const div = document.createElement('div');
    div.className = 'history-item';

    div.innerHTML = `
      <b>${row.coin_symbol}</b><br>
      Amount: ${Number(row.amount).toFixed(8)}<br>
      Status: ${row.status}<br>
      Date: ${new Date(row.created_at).toLocaleString()}
    `;

    if(row.status === "pending"){
      const btn = document.createElement('button');
      btn.className = 'cancel';
      btn.innerText = "Cancel";
      btn.onclick = ()=> cancelWithdrawal(row);
      div.appendChild(btn);
    }

    historyList.appendChild(div);
  });
}

async function cancelWithdrawal(row){

  await supabaseClient
    .from('withdraw_requests')
    .update({status:"cancelled"})
    .eq('id', row.id);

  const { data: wallet } = await supabaseClient
    .from('wallets')
    .select('*')
    .eq('user_id', userId)
    .eq('coin_symbol', row.coin_symbol)
    .single();

  await supabaseClient
    .from('wallets')
    .update({
      balance: Number(wallet.balance) + Number(row.amount),
      locked: Number(wallet.locked) - Number(row.amount)
    })
    .eq('id', wallet.id);

  alert("Withdrawal cancelled");

  loadWallets();
  loadHistory();
}

async function openPanel(wallet){
  selectedWallet = wallet;
  panelTitle.innerText = wallet.coin_symbol + " Withdrawal";

  const { data } = await supabaseClient
    .from('deposit_wallets')
    .select('network')
    .eq('asset', wallet.coin_symbol);

  networkSelect.innerHTML = "";
  data.forEach(n=>{
    const opt = document.createElement('option');
    opt.value = n.network;
    opt.textContent = n.network;
    networkSelect.appendChild(opt);
  });

  panel.classList.add('active');
}

function closePanel(){ panel.classList.remove('active'); }

function useMax(){
  document.getElementById('amountInput').value = selectedWallet.balance;
  calculateFee();
}

document.getElementById('amountInput')
.addEventListener('input', calculateFee);

function calculateFee(){
  const amount = Number(document.getElementById('amountInput').value);
  if(!amount) return;
  const fee = amount * 0.0001;
  const receive = amount - fee;
  document.getElementById('feeInfo').innerText =
    "Fee: "+fee.toFixed(8)+" | You Receive: "+receive.toFixed(8);
}

async function submitWithdrawal(){

  const amount = Number(document.getElementById('amountInput').value);
  const address = document.getElementById('addressInput').value;

  if(!amount || amount<=0) return alert("Invalid amount");
  if(amount > selectedWallet.balance) return alert("Insufficient balance");
  if(!address) return alert("Address required");

  await supabaseClient.from('wallets')
    .update({
      balance: selectedWallet.balance - amount,
      locked: Number(selectedWallet.locked || 0) + amount
    })
    .eq('id', selectedWallet.id);

  await supabaseClient.from('withdraw_requests')
    .insert({
      user_id: userId,
      coin_symbol: selectedWallet.coin_symbol,
      amount: amount,
      status: "pending",
      created_at: new Date()
    });

  alert("Withdrawal submitted successfully");

  closePanel();
  loadWallets();
  loadHistory();
}

</script>

</body>
</html>
