<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: 'Roboto', sans-serif;
  margin: 0;
  background-color: #f8f9fa;
  padding-bottom: 60px;
}

/* Header */
header {
  background-color: #1a1a2e;
  color: #fff;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 10;
}
header h1 { margin: 0; font-size: 20px; }
#menuBtn {
  background-color: #4b49ac;
  color: #fff;
  border: none;
  padding: 8px 15px;
  border-radius: 5px;
  cursor: pointer;
  font-weight: 500;
}

/* Side menu */
#sideMenu {
  position: fixed;
  top: 0;
  right: -400px;
  width: 33%;
  max-width: 300px;
  height: 100%;
  background-color: #fff;
  box-shadow: -2px 0 6px rgba(0,0,0,0.2);
  transition: right 0.3s;
  z-index: 100;
  padding: 20px;
}
#sideMenu.active { right: 0; }
#sideMenu a {
  display: block;
  margin: 15px 0;
  color: #1a1a2e;
  text-decoration: none;
  font-weight: 500;
}
#closeMenu {
  background-color: #e74c3c;
  color: #fff;
  border: none;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 5px;
  margin-bottom: 15px;
}

/* Balance Card */
.container { padding: 20px; }
.balance-card {
  background-color: #fff;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}
.balance-card h2 { margin-top: 0; }
.balance-card p {
  margin: 10px 0 20px;
  font-size: 16px;
  line-height: 1.5;
}
.balance-card button {
  padding: 10px 20px;
  margin-right: 10px;
  background-color: #4b49ac;
  color: #fff;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: 500;
}
.balance-card button:disabled {
  background-color: #999;
  cursor: not-allowed;
}

/* Bottom Navbar */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background-color: #1a1a2e;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  z-index: 10;
}
.bottom-nav a {
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.bottom-nav a.active { color: #4b49ac; }

@media (min-width: 768px) { .bottom-nav { display: none; } }
</style>
</head>
<body>

<header>
  <h1>Dashboard</h1>
  <button id="menuBtn" onclick="toggleMenu()">Menu</button>
</header>

<div id="sideMenu">
  <button id="closeMenu" onclick="toggleMenu()">Close</button>
  <h2>Menu</h2>
  <a href="profile.html">Profile</a>
  <a href="kyc.html">KYC</a>
  <a href="changepassword.html">Change Password</a>
  <a href="2fa.html">2FA Settings</a>
  <a href="fee.html">Fees</a>
  <a href="referral.html">Referral</a>
  <button style="width:100%;margin-top:20px;padding:10px;background:#e74c3c;color:#fff;border:none;border-radius:5px;cursor:pointer;" onclick="logout()">Logout</button>
</div>

<div class="container">
  <div class="balance-card">
    <h2>Welcome, <span id="userName">—</span>!</h2>
    <p>
      Deposit. Trade. Grow. 🚀<br>
      Start now and take control of your financial future!
    </p>

    <!-- تصویر خوش آمد گویی -->
    <img id="welcomeImg" src="https://example.com/welcome.png" alt="Welcome" style="width:100%;max-width:400px;border-radius:10px;margin-top:15px;display:block;">

    <div style="display:flex;gap:10px;margin-top:15px;">
      <button onclick="window.location.href='wallet.html'" style="flex:1;">Deposit</button>
      <button onclick="window.location.href='referral.html'" style="flex:1;">Referral</button>
    </div>

    <!-- دکمه پاداش -->
    <div style="margin-top:20px;">
      <button id="rewardBtn" style="width:100%;padding:10px;" disabled>Receive Reward</button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html" class="active">dashboard</a>
  <a href="wallet.html">Wallet</a>
  <a href="market.html">Markets</a>
  <a href="trade.html">Trade</a>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  "https://iecnioogmafgxwarmkxz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA"
);

// Menu
window.toggleMenu = () => { document.getElementById('sideMenu').classList.toggle('active'); };

// Logout
window.logout = async () => { await supabase.auth.signOut(); window.location.href = "index.html"; };

// Load User Info
async function loadUser() {
  const { data:{session} } = await supabase.auth.getSession();
  if(!session) return;

  const { data: user } = await supabase
    .from('users')
    .select('*')
    .eq('id', session.user.id)
    .single();

  const fullName = `${user?.first_name || ''} ${user?.last_name || ''}`.trim() || 'User';
  document.getElementById('userName').textContent = fullName;

  // بررسی KYC و پاداش
  const { data: kyc } = await supabase
    .from('kyc_requests')
    .select('status')
    .eq('user_id', session.user.id)
    .single();

  const rewardBtn = document.getElementById('rewardBtn');
  if(!kyc || kyc.status !== 'approved') {
    rewardBtn.disabled = true;
    rewardBtn.textContent = 'Complete KYC to receive reward';
  } else if(user.reward_claimed) {
    rewardBtn.disabled = true;
    rewardBtn.textContent = 'Reward already claimed';
  } else {
    rewardBtn.disabled = false;
    rewardBtn.textContent = 'Receive Reward';
  }

  rewardBtn.onclick = async () => {
    rewardBtn.disabled = true;
    rewardBtn.textContent = 'Reward claimed!';

    // افزودن پاداش در جدول wallets
    await supabase
      .from('wallets')
      .update({ balance: 151 })
      .eq('user_id', session.user.id)
      .eq('coin_symbol', 'DOGE');

    // ثبت در جدول users که پاداش گرفته شد
    await supabase
      .from('users')
      .update({ reward_claimed: true })
      .eq('id', session.user.id);
  };
}

loadUser();
</script>

</body>
</html>
