<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Sign Up</title>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = "https://iecnioogmafgxwarmkxz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA";

window.supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
// بررسی ورود خودکار کاربر
window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    // اگر کاربر قبلاً لاگین کرده، مستقیم به داشبورد برو
    location.href = 'dashboard.html';
  }

</script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f8f9fa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container{
  background:#fff;
  padding:40px 30px;
  border-radius:15px;
  width:500px;
  max-width:95%;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
h2{text-align:center;color:#1a1a2e;margin-bottom:25px;}
.home-btn{
  display:block;
  width:100%;
  margin-bottom:20px;
  padding:12px 0;
  font-size:16px;
  font-weight:bold;
  border:none;
  border-radius:8px;
  background:#4b49ac;
  color:#fff;
  cursor:pointer;
}
.toggle-btns{display:flex;justify-content:center;margin-bottom:20px;}
.toggle-btns button{
  flex:1;margin:0 5px;padding:10px;border:none;border-radius:8px;
  background:#f0f0f0;color:#333;cursor:pointer;
}
.toggle-btns button.active{background:#4b49ac;color:#fff;}
form{display:none;flex-direction:column;}
label{margin-top:10px;font-weight:500;color:#1a1a2e;}
input,select{
  width:100%;padding:12px 15px;margin:5px 0;
  border-radius:8px;border:1px solid #ccc;font-size:16px;
}
button.submit-btn{
  width:100%;padding:12px;margin:15px 0;border-radius:8px;
  border:none;background:#4b49ac;color:#fff;font-size:16px;cursor:pointer;
}
#msg{text-align:center;font-weight:600;color:red;}
</style>
</head>

<body>

<div class="container">
  <button class="home-btn" onclick="location.href='dashboard.html'">Home</button>

  <h2>Welcome</h2>

  <div class="toggle-btns">
    <button id="btnLogin" class="active">Login</button>
    <button id="btnSignUp">Sign Up</button>
  </div>

  <!-- LOGIN -->
  <form id="loginForm">
    <label>Email</label>
    <input type="email" id="loginEmail" required>
    <label>Password</label>
    <input type="password" id="loginPassword" required>
    <button type="button" class="submit-btn" id="loginSubmit">Login</button>
  </form>

  <!-- SIGN UP -->
  <form id="signupForm">
    <label>First Name</label>
    <input type="text" id="signupFirstName" required>

    <label>Last Name</label>
    <input type="text" id="signupLastName" required>

    <label>Date of Birth</label>
    <input type="date" id="signupDOB" required>

    <label>Country</label>
    <select id="signupCountry" required>
      <option value="">Select Country</option>
    </select>

    <label>Email</label>
    <input type="email" id="signupEmail" required>

    <label>Password</label>
    <input type="password" id="signupPassword" required>

    <button type="button" class="submit-btn" id="signupSubmit">Sign Up</button>
  </form>

  <p id="msg"></p>
</div>

<script type="module">
window.addEventListener('DOMContentLoaded', () => {

  const btnLogin = document.getElementById('btnLogin');
  const btnSignUp = document.getElementById('btnSignUp');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const msg = document.getElementById('msg');
  const signupCountry = document.getElementById('signupCountry');

  // لیست کامل کشورها
  const countries = [
    "Afghanistan","Albania","Algeria","Andorra","Angola","Argentina","Armenia","Australia","Austria","Azerbaijan",
    "Bahamas","Bahrain","Bangladesh","Belarus","Belgium","Belize","Benin","Bhutan","Bolivia","Bosnia and Herzegovina","Botswana",
    "Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cambodia","Cameroon","Canada","Cape Verde","Central African Republic",
    "Chad","Chile","China","Colombia","Comoros","Congo","Costa Rica","Croatia","Cuba","Cyprus","Czech Republic","Denmark",
    "Djibouti","Dominica","Dominican Republic","Ecuador","Egypt","El Salvador","Equatorial Guinea","Eritrea","Estonia","Eswatini",
    "Ethiopia","Fiji","Finland","France","Gabon","Gambia","Georgia","Germany","Ghana","Greece","Grenada","Guatemala","Guinea",
    "Guinea-Bissau","Guyana","Haiti","Honduras","Hungary","Iceland","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy",
    "Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kiribati","Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon","Lesotho","Liberia",
    "Libya","Liechtenstein","Lithuania","Luxembourg","Madagascar","Malawi","Malaysia","Maldives","Mali","Malta","Marshall Islands",
    "Mauritania","Mauritius","Mexico","Micronesia","Moldova","Monaco","Mongolia","Montenegro","Morocco","Mozambique","Myanmar",
    "Namibia","Nauru","Nepal","Netherlands","New Zealand","Nicaragua","Niger","Nigeria","North Korea","North Macedonia","Norway",
    "Oman","Pakistan","Palau","Palestine","Panama","Papua New Guinea","Paraguay","Peru","Philippines","Poland","Portugal","Qatar",
    "Romania","Russia","Rwanda","Saint Kitts and Nevis","Saint Lucia","Saint Vincent and the Grenadines","Samoa","San Marino",
    "Sao Tome and Principe","Saudi Arabia","Senegal","Serbia","Seychelles","Sierra Leone","Singapore","Slovakia","Slovenia",
    "Solomon Islands","Somalia","South Africa","South Korea","South Sudan","Spain","Sri Lanka","Sudan","Suriname","Sweden",
    "Switzerland","Syria","Taiwan","Tajikistan","Tanzania","Thailand","Timor-Leste","Togo","Tonga","Trinidad and Tobago",
    "Tunisia","Turkey","Turkmenistan","Tuvalu","Uganda","Ukraine","United Arab Emirates","United Kingdom","United States",
    "Uruguay","Uzbekistan","Vanuatu","Vatican City","Venezuela","Vietnam","Yemen","Zambia","Zimbabwe"
  ];

  countries.forEach(c => {
    signupCountry.insertAdjacentHTML("beforeend", `<option value="${c}">${c}</option>`);
  });

  // Toggle فرم ها
  loginForm.style.display = "flex";
  signupForm.style.display = "none";

  btnLogin.addEventListener('click', () => {
    btnLogin.classList.add("active");
    btnSignUp.classList.remove("active");
    loginForm.style.display = "flex";
    signupForm.style.display = "none";
    msg.innerText = "";
  });

  btnSignUp.addEventListener('click', () => {
    btnSignUp.classList.add("active");
    btnLogin.classList.remove("active");
    signupForm.style.display = "flex";
    loginForm.style.display = "none";
    msg.innerText = "";
  });

  // Login
  const loginSubmit = document.getElementById('loginSubmit');
  loginSubmit.addEventListener('click', async () => {
    const { error } = await supabase.auth.signInWithPassword({
      email: document.getElementById('loginEmail').value,
      password: document.getElementById('loginPassword').value
    });
    if (error) { msg.innerText = error.message; return; }
    location.href = "dashboard.html";
  });

  // Sign Up
  const signupSubmit = document.getElementById('signupSubmit');
  signupSubmit.addEventListener('click', async () => {
    msg.innerText = "";

    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value.trim();
    const firstName = document.getElementById('signupFirstName').value.trim();
    const lastName = document.getElementById('signupLastName').value.trim();
    const dob = document.getElementById('signupDOB').value;
    const country = signupCountry.value;

    if(!email || !password || !firstName || !lastName || !dob || !country){
      msg.innerText = "Please fill all fields";
      return;
    }

    const params = new URLSearchParams(location.search);
    const refCode = params.get("ref");

    const { data, error } = await supabase.auth.signUp({ email, password });
    if (error) { msg.innerText = error.message; return; }

    const userId = data.user.id;
    const myReferralCode = userId.slice(0, 8);

    await supabase.from("users").insert({
      id: userId,
      email,
      first_name: firstName,
      last_name: lastName,
      dob,
      country,
      referral_code: myReferralCode,
      referral_id: refCode || null
    });

    msg.style.color = "green";
    msg.innerText = "Registered successfully. Please login.";
    // فرم ثبت نام مخفی و فرم لاگین نمایش داده شود
    signupForm.style.display = "none";
    loginForm.style.display = "flex";
    btnLogin.classList.add("active");
    btnSignUp.classList.remove("active");
  });

});
</script>

</body>
</html>
