<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f8f9fa;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.container{
  background:#fff;
  padding:40px 30px;
  border-radius:15px;
  width:500px;
  max-width:95%;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
h2{text-align:center;color:#1a1a2e;margin-bottom:25px;}
.home-btn{
  display:block;
  width:100%;
  margin-bottom:20px;
  padding:12px 0;
  font-size:16px;
  font-weight:bold;
  border:none;
  border-radius:8px;
  background:#4b49ac;
  color:#fff;
  cursor:pointer;
}
.toggle-btns{display:flex;justify-content:center;margin-bottom:20px;}
.toggle-btns button{
  flex:1;margin:0 5px;padding:10px;border:none;border-radius:8px;
  background:#f0f0f0;color:#333;cursor:pointer;
}
.toggle-btns button.active{background:#4b49ac;color:#fff;}
form{display:none;flex-direction:column;}
label{margin-top:10px;font-weight:500;color:#1a1a2e;}
input,select{
  width:100%;padding:12px 15px;margin:5px 0;
  border-radius:8px;border:1px solid #ccc;font-size:16px;
}
button.submit-btn{
  width:100%;padding:12px;margin:15px 0;border-radius:8px;
  border:none;background:#4b49ac;color:#fff;font-size:16px;cursor:pointer;
}
#msg{text-align:center;font-weight:600;color:red;}
</style>
</head>

<body>
<div class="container">
  <button class="home-btn" onclick="location.href='dashboard.html'">Home</button>
  <h2>Welcome</h2>
  <div class="toggle-btns">
    <button id="btnLogin" class="active">Login</button>
    <button id="btnSignUp">Sign Up</button>
  </div>

  <!-- Login Form -->
  <form id="loginForm" style="display:flex;">
    <label>Email</label>
    <input type="email" id="loginEmail">
    <label>Password</label>
    <input type="password" id="loginPassword">
    <button type="button" class="submit-btn" id="loginSubmit">Login</button>
  </form>

  <!-- Sign Up Form -->
  <form id="signupForm">
    <label>First Name</label>
    <input type="text" id="signupFirstName">
    <label>Last Name</label>
    <input type="text" id="signupLastName">
    <label>Date of Birth</label>
    <input type="date" id="signupDOB">
    <label>Country</label>
    <select id="signupCountry"><option value="">Select Country</option></select>
    <label>Email</label>
    <input type="email" id="signupEmail">
    <label>Password</label>
    <input type="password" id="signupPassword">
    <label>Referral Code (optional)</label>
    <input type="text" id="signupReferral">
    <button type="button" class="submit-btn" id="signupSubmit">Sign Up</button>
  </form>

  <p id="msg"></p>
</div>

<script type="module">
const signupCountry = document.getElementById('signupCountry');
countries.forEach(c=>{
  signupCountry.insertAdjacentHTML("beforeend",`<option value="${c}">${c}</option>`);
});

// Toggle forms
const btnLogin = document.getElementById('btnLogin');
const btnSignUp = document.getElementById('btnSignUp');
const loginForm = document.getElementById('loginForm');
const signupForm = document.getElementById('signupForm');
const msg = document.getElementById('msg');

btnLogin.onclick = () => {
  btnLogin.classList.add("active");
  btnSignUp.classList.remove("active");
  loginForm.style.display="flex";
  signupForm.style.display="none";
  msg.innerText="";
};
btnSignUp.onclick = () => {
  btnSignUp.classList.add("active");
  btnLogin.classList.remove("active");
  signupForm.style.display="flex";
  loginForm.style.display="none";
  msg.innerText="";
};

// Auto-login if session exists
window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if(session) {
    location.href = "dashboard.html";
  } else {
    loginForm.style.display="flex";
  }
});

// Login
loginSubmit.onclick = async () => {
  const { error } = await supabase.auth.signInWithPassword({
    email: loginEmail.value.trim(),
    password: loginPassword.value.trim()
  });
  if(error){ msg.innerText = error.message; return; }
  location.href = "dashboard.html";
};

// Sign Up
signupSubmit.onclick = async () => {
  msg.innerText = "";
  const email = signupEmail.value.trim();
  const password = signupPassword.value.trim();
  const first_name = signupFirstName.value.trim();
  const last_name = signupLastName.value.trim();
  const dob = signupDOB.value;
  const country = signupCountry.value;
  const refCode = signupReferral.value.trim() || null;

  if(!email || !password) { msg.innerText="Email and Password required"; return; }

  const { data, error } = await supabase.auth.signUp({ email, password });
  if(error){ msg.innerText = error.message; return; }

  const userId = data.user.id;
  const myReferralCode = userId.slice(0,8);

  await supabase.from("users").insert({
    id: userId,
    email,
    first_name,
    last_name,
    dob,
    country,
    referral_code: myReferralCode,
    referral_id: refCode,
  });

  msg.style.color="green";
  msg.innerText = "Registered successfully. Please login.";
  btnLogin.click();
};
</script>
</body>
