<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novabit</title>

<script type="module">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f8f9fa;
}
header{
  background:#1a1a2e;
  color:#fff;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header h1{margin:0;}
.top-buttons button{
  background:#4b49ac;
  border:none;
  color:#fff;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  margin-left:10px;
}

.container{padding:20px;}

.auth-box{
  max-width:500px;
  margin:40px auto;
  background:#fff;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  display:none;
}

.toggle-buttons{
  display:flex;
  margin-bottom:20px;
}
.toggle-buttons button{
  flex:1;
  padding:10px;
  border:none;
  cursor:pointer;
  background:#eee;
}
.toggle-buttons button.active{
  background:#4b49ac;
  color:#fff;
}

form{display:none;flex-direction:column;}
form input, form select{
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

.submit-btn{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#4b49ac;
  color:#fff;
  cursor:pointer;
}

#msg{text-align:center;margin-top:10px;font-weight:bold;}
</style>
</head>

<body>

<header>
  <h1>Novabit</h1>
  <div class="top-buttons">
    <button onclick="openAuth('login')">Login</button>
    <button onclick="openAuth('signup')">Sign Up</button>
  </div>
</header>

<div class="container">
  <h2>Welcome to Novabit</h2>
  <p>Trade crypto safely and easily.</p>
</div>

<div class="auth-box" id="authBox">

  <div class="toggle-buttons">
    <button id="btnLogin" class="active">Login</button>
    <button id="btnSignUp">Sign Up</button>
  </div>

  <!-- LOGIN -->
  <form id="loginForm" style="display:flex;">
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button type="button" class="submit-btn" id="loginSubmit">Login</button>
  </form>

  <!-- SIGN UP -->
  <form id="signupForm">
    <input type="text" id="signupFirstName" placeholder="First Name">
    <input type="text" id="signupLastName" placeholder="Last Name">
    <input type="date" id="signupDOB">
    <select id="signupCountry">
      <option value="">Select Country</option>
      <option>Afghanistan</option>
      <option>Iran</option>
      <option>Turkey</option>
      <option>Germany</option>
      <option>United States</option>
    </select>
    <input type="email" id="signupEmail" placeholder="Email">
    <input type="password" id="signupPassword" placeholder="Password">
    <button type="button" class="submit-btn" id="signupSubmit">Sign Up</button>
  </form>

  <p id="msg"></p>
</div>

<script type="module">

// باز کردن فرم
window.openAuth = function(type){
  document.getElementById("authBox").style.display="block";
  if(type==="login"){
    btnLogin.click();
  }else{
    btnSignUp.click();
  }
}

// Toggle
btnLogin.onclick=()=>{
  btnLogin.classList.add("active");
  btnSignUp.classList.remove("active");
  loginForm.style.display="flex";
  signupForm.style.display="none";
  msg.innerText="";
};

btnSignUp.onclick=()=>{
  btnSignUp.classList.add("active");
  btnLogin.classList.remove("active");
  signupForm.style.display="flex";
  loginForm.style.display="none";
  msg.innerText="";
};

// LOGIN
loginSubmit.onclick=async()=>{
  const {error}=await supabase.auth.signInWithPassword({
    email:loginEmail.value,
    password:loginPassword.value
  });

  if(error){
    msg.style.color="red";
    msg.innerText=error.message;
    return;
  }

  location.href="dashboard.html";
};

// SIGN UP
signupSubmit.onclick=async()=>{

  msg.innerText="";
  const email=signupEmail.value.trim();
  const password=signupPassword.value.trim();

  const params=new URLSearchParams(location.search);
  const refCode=params.get("ref");

  const {data,error}=await supabase.auth.signUp({email,password});
  if(error){
    msg.style.color="red";
    msg.innerText=error.message;
    return;
  }

  const userId=data.user.id;

  const myReferralCode=userId.slice(0,8);

  await supabase.from("users").insert({
    id:userId,
    email,
    first_name:signupFirstName.value,
    last_name:signupLastName.value,
    dob:signupDOB.value,
    country:signupCountry.value,
    referral_code:myReferralCode,
    referral_id:refCode||null,
    telegram_id:null
  });

  msg.style.color="green";
  msg.innerText="Registered successfully. Please login.";
};

</script>

</body>
</html>
