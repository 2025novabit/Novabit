<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Sign Up</title>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL = "https://iecnioogmafgxwarmkxz.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA";
  window.supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
</script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f8f9fa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container{
  background:#fff;
  padding:40px 30px;
  border-radius:15px;
  width:500px;
  max-width:95%;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
h2{text-align:center;color:#1a1a2e;margin-bottom:25px;}
.toggle-btns{display:flex;justify-content:center;margin-bottom:20px;}
.toggle-btns button{
  flex:1;margin:0 5px;padding:10px;border:none;border-radius:8px;
  background:#f0f0f0;color:#333;cursor:pointer;
}
.toggle-btns button.active{background:#4b49ac;color:#fff;}
form{display:none;flex-direction:column;}
label{margin-top:10px;font-weight:500;color:#1a1a2e;}
input,select{
  width:100%;padding:12px 15px;margin:5px 0;
  border-radius:8px;border:1px solid #ccc;font-size:16px;
}
button.submit-btn{
  width:100%;padding:12px;margin:15px 0;border-radius:8px;
  border:none;background:#4b49ac;color:#fff;font-size:16px;cursor:pointer;
}
#msg{text-align:center;font-weight:600;color:red;}
</style>
</head>

<body>

<div class="container">
  <h2>Welcome</h2>

  <div class="toggle-btns">
    <button id="btnLogin" class="active">Login</button>
    <button id="btnSignUp">Sign Up</button>
  </div>

  <!-- LOGIN -->
  <form id="loginForm" style="display:flex;">
    <label>Email</label>
    <input type="email" id="loginEmail" required>
    <label>Password</label>
    <input type="password" id="loginPassword" required>
    <button type="submit" class="submit-btn">Login</button>
  </form>

  <!-- SIGN UP -->
  <form id="signupForm">
    <label>First Name</label>
    <input type="text" id="signupFirstName" required>

    <label>Last Name</label>
    <input type="text" id="signupLastName" required>

    <label>Date of Birth</label>
    <input type="date" id="signupDOB" required>

    <label>Country</label>
    <select id="signupCountry" required>
      <option value="">Select Country</option>
    </select>

    <label>Email</label>
    <input type="email" id="signupEmail" required>

    <label>Password</label>
    <input type="password" id="signupPassword" required>

    <button type="submit" class="submit-btn">Sign Up</button>
  </form>

  <p id="msg"></p>
</div>

<script type="module">
// 🔹 Countries: Top 20
const topCountries = [
  "United States", "China", "India", "Brazil", "Germany", "United Kingdom",
  "France", "Italy", "Canada", "Russia", "Australia", "Japan", "South Korea",
  "Mexico", "Spain", "Indonesia", "Turkey", "Saudi Arabia", "Netherlands", "Switzerland"
];

topCountries.forEach(c=>{
  signupCountry.insertAdjacentHTML(
    "beforeend",
    `<option value="${c}">${c}</option>`
  );
});

// 🔹 Toggle Forms
btnLogin.onclick=()=>{
  btnLogin.classList.add("active");
  btnSignUp.classList.remove("active");
  loginForm.style.display="flex";
  signupForm.style.display="none";
  msg.innerText="";
};

btnSignUp.onclick=()=>{
  btnSignUp.classList.add("active");
  btnLogin.classList.remove("active");
  signupForm.style.display="flex";
  loginForm.style.display="none";
  msg.innerText="";
};

// 🔹 Prevent refresh & handle login
loginForm.addEventListener("submit", async (e)=>{
  e.preventDefault();
  const {error}=await supabase.auth.signInWithPassword({
    email: loginEmail.value,
    password: loginPassword.value
  });
  if(error){
    msg.style.color="red";
    msg.innerText=error.message;
    return;
  }
  location.href="dashboard.html";
});

// 🔹 Sign Up
signupForm.addEventListener("submit", async (e)=>{
  e.preventDefault();
  msg.innerText="";

  const email = signupEmail.value.trim();
  const password = signupPassword.value.trim();

  const params = new URLSearchParams(location.search);
  const refCode = params.get("ref");

  // Telegram ID اتومات (در صورت WebApp)
  let telegramId = null;
  if(window.Telegram && Telegram.WebApp){
    Telegram.WebApp.ready();
    const user = Telegram.WebApp.initDataUnsafe?.user;
    if(user){ telegramId = user.id.toString(); }
  }

  const { data, error } = await supabase.auth.signUp({email, password});
  if(error){
    msg.style.color="red";
    msg.innerText=error.message;
    return;
  }

  const userId = data.user.id;
  const myReferralCode = userId.slice(0,8);

  await supabase.from("users").insert({
    id: userId,
    email,
    first_name: signupFirstName.value,
    last_name: signupLastName.value,
    dob: signupDOB.value,
    country: signupCountry.value,
    referral_code: myReferralCode,
    referral_id: refCode || null,
    telegram_id: telegramId
  });

  msg.style.color="green";
  msg.innerText="Registered successfully. Please login.";
  btnLogin.click();
});
</script>

</body>
</html>
