<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Sign Up</title>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL = "https://iecnioogmafgxwarmkxz.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA";

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 🔹 بررسی Session موجود
  async function checkSession() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      // کاربر قبلاً لاگین کرده → مستقیم به داشبورد
      location.href = "dashboard.html";
    } else {
      // نمایش فرم لاگین/ثبت‌نام
      document.getElementById('loginForm').style.display = 'flex';
    }
  }

  window.addEventListener('DOMContentLoaded', checkSession);

  // 🔹 Toggle بین فرم‌ها
  window.btnLogin = document.getElementById('btnLogin');
  window.btnSignUp = document.getElementById('btnSignUp');
  window.loginForm = document.getElementById('loginForm');
  window.signupForm = document.getElementById('signupForm');
  window.msg = document.getElementById('msg');

  btnLogin.onclick=()=>{
    btnLogin.classList.add("active");
    btnSignUp.classList.remove("active");
    loginForm.style.display="flex";
    signupForm.style.display="none";
    msg.innerText="";
  };

  btnSignUp.onclick=()=>{
    btnSignUp.classList.add("active");
    btnLogin.classList.remove("active");
    signupForm.style.display="flex";
    loginForm.style.display="none";
    msg.innerText="";
  };

  // 🔹 Login
  document.getElementById('loginSubmit').onclick = async()=>{
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if(error){ msg.innerText = error.message; return; }

    location.href = "dashboard.html";
  };

  // 🔹 Sign Up
  document.getElementById('signupSubmit').onclick = async()=>{
    msg.innerText="";
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value.trim();
    const first_name = document.getElementById('signupFirstName').value.trim();
    const last_name = document.getElementById('signupLastName').value.trim();
    const dob = document.getElementById('signupDOB').value;
    const country = document.getElementById('signupCountry').value;

    // بررسی Referral از URL
    const params = new URLSearchParams(location.search);
    const refCode = params.get("ref");

    // ثبت در Supabase auth
    const { data, error } = await supabase.auth.signUp({ email, password });
    if(error){ msg.innerText = error.message; return; }

    const userId = data.user.id;
    const myReferralCode = userId.slice(0,8);

    // ثبت در جدول users
    await supabase.from("users").insert({
      id: userId,
      email,
      first_name,
      last_name,
      dob,
      country,
      referral_code: myReferralCode,
      referral_id: refCode || null
    });

    msg.style.color="green";
    msg.innerText="Registered successfully. Please login.";
    // فرم لاگین نمایش داده شود
    btnLogin.click();
  };
</script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f8f9fa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container{
  background:#fff;
  padding:40px 30px;
  border-radius:15px;
  width:500px;
  max-width:95%;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
h2{text-align:center;color:#1a1a2e;margin-bottom:25px;}
.home-btn{
  display:block;
  width:100%;
  margin-bottom:20px;
  padding:12px 0;
  font-size:16px;
  font-weight:bold;
  border:none;
  border-radius:8px;
  background:#4b49ac;
  color:#fff;
  cursor:pointer;
}
.toggle-btns{display:flex;justify-content:center;margin-bottom:20px;}
.toggle-btns button{
  flex:1;margin:0 5px;padding:10px;border:none;border-radius:8px;
  background:#f0f0f0;color:#333;cursor:pointer;
}
.toggle-btns button.active{background:#4b49ac;color:#fff;}
form{display:none;flex-direction:column;}
label{margin-top:10px;font-weight:500;color:#1a1a2e;}
input,select{
  width:100%;padding:12px 15px;margin:5px 0;
  border-radius:8px;border:1px solid #ccc;font-size:16px;
}
button.submit-btn{
  width:100%;padding:12px;margin:15px 0;border-radius:8px;
  border:none;background:#4b49ac;color:#fff;font-size:16px;cursor:pointer;
}
#msg{text-align:center;font-weight:600;color:red;}
</style>
</head>

<body>
<div class="container">
  <button class="home-btn" onclick="location.href='dashboard.html'">Home</button>
  <h2>Welcome</h2>

  <div class="toggle-btns">
    <button id="btnLogin" class="active">Login</button>
    <button id="btnSignUp">Sign Up</button>
  </div>

  <!-- LOGIN FORM -->
  <form id="loginForm" style="display:flex;">
    <label>Email</label>
    <input type="email" id="loginEmail">
    <label>Password</label>
    <input type="password" id="loginPassword">
    <button type="button" class="submit-btn" id="loginSubmit">Login</button>
  </form>

  <!-- SIGNUP FORM -->
  <form id="signupForm">
    <label>First Name</label>
    <input type="text" id="signupFirstName">
    <label>Last Name</label>
    <input type="text" id="signupLastName">
    <label>Date of Birth</label>
    <input type="date" id="signupDOB">
    <label>Country</label>
    <select id="signupCountry">
      <option value="">Select Country</option>
      <option value="Afghanistan">Afghanistan</option>
      <option value="Iran">Iran</option>
      <option value="Turkey">Turkey</option>
      <option value="Germany">Germany</option>
      <option value="United States">United States</option>
      <option value="UK">UK</option>
      <option value="France">France</option>
      <option value="Italy">Italy</option>
      <option value="Spain">Spain</option>
      <option value="Russia">Russia</option>
      <option value="China">China</option>
      <option value="India">India</option>
      <option value="Pakistan">Pakistan</option>
      <option value="Japan">Japan</option>
      <option value="South Korea">South Korea</option>
      <option value="Canada">Canada</option>
      <option value="Australia">Australia</option>
      <option value="Brazil">Brazil</option>
      <option value="Mexico">Mexico</option>
      <option value="Egypt">Egypt</option>
    </select>
    <label>Email</label>
    <input type="email" id="signupEmail">
    <label>Password</label>
    <input type="password" id="signupPassword">
    <button type="button" class="submit-btn" id="signupSubmit">Sign Up</button>
  </form>

  <p id="msg"></p>
</div>
</body>
</html>
