<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Sign Up</title>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = "https://iecnioogmafgxwarmkxz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA";

window.supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// اگر قبلاً لاگین باشد مستقیم داشبورد
window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) location.href = "dashboard.html";
});
</script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f8f9fa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container{
  background:#fff;
  padding:40px 30px;
  border-radius:15px;
  width:500px;
  max-width:95%;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
h2{text-align:center;color:#1a1a2e;margin-bottom:25px;}
.toggle-btns{display:flex;justify-content:center;margin-bottom:20px;}
.toggle-btns button{
  flex:1;margin:0 5px;padding:10px;border:none;border-radius:8px;
  background:#f0f0f0;color:#333;cursor:pointer;
}
.toggle-btns button.active{background:#4b49ac;color:#fff;}
form{display:none;flex-direction:column;}
label{margin-top:10px;font-weight:500;color:#1a1a2e;}
input,select{
  width:100%;padding:12px;margin:5px 0;
  border-radius:8px;border:1px solid #ccc;font-size:15px;
}
button.submit-btn{
  width:100%;padding:12px;margin:15px 0;border-radius:8px;
  border:none;background:#4b49ac;color:#fff;font-size:16px;cursor:pointer;
}
#msg{text-align:center;font-weight:600;color:red;margin-top:10px;}
</style>
</head>

<body>

<div class="container">
  <h2>Welcome</h2>

  <div class="toggle-btns">
    <button id="btnLogin" class="active">Login</button>
    <button id="btnSignUp">Sign Up</button>
  </div>

  <!-- LOGIN -->
  <form id="loginForm">
    <label>Email</label>
    <input type="email" id="loginEmail" required>

    <label>Password</label>
    <input type="password" id="loginPassword" required>

    <button type="button" class="submit-btn" id="loginSubmit">Login</button>
  </form>

  <!-- SIGNUP -->
  <form id="signupForm">

    <label>First Name</label>
    <input type="text" id="signupFirstName" required>

    <label>Last Name</label>
    <input type="text" id="signupLastName" required>

    <label>Date of Birth</label>
    <input type="date" id="signupDOB" required>

    <label>Country</label>
    <select id="signupCountry" required>
      <option value="">Select Country</option>
    </select>

    <label>Email</label>
    <input type="email" id="signupEmail" required>

    <label>Password</label>
    <input type="password" id="signupPassword" required>

    <label>Referral Code (Optional)</label>
    <input type="text" id="signupReferral" placeholder="Enter referral code">

    <button type="button" class="submit-btn" id="signupSubmit">Sign Up</button>
  </form>

  <p id="msg"></p>
</div>

<script type="module">

window.addEventListener('DOMContentLoaded', () => {

  const btnLogin = document.getElementById('btnLogin');
  const btnSignUp = document.getElementById('btnSignUp');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const msg = document.getElementById('msg');
  const signupCountry = document.getElementById('signupCountry');
  const referralInput = document.getElementById('signupReferral');

  // لیست کامل کشورها
  const countries = ["Afghanistan","Albania","Algeria","Andorra","Angola","Argentina","Armenia","Australia","Austria","Azerbaijan",
  "Bahamas","Bahrain","Bangladesh","Belarus","Belgium","Belize","Benin","Bhutan","Bolivia","Bosnia and Herzegovina","Botswana",
  "Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cambodia","Cameroon","Canada","Cape Verde","Central African Republic",
  "Chad","Chile","China","Colombia","Comoros","Congo","Costa Rica","Croatia","Cuba","Cyprus","Czech Republic","Denmark",
  "Djibouti","Dominica","Dominican Republic","Ecuador","Egypt","El Salvador","Equatorial Guinea","Eritrea","Estonia","Eswatini",
  "Ethiopia","Fiji","Finland","France","Gabon","Gambia","Georgia","Germany","Ghana","Greece","Guatemala","Guinea","Guyana",
  "Haiti","Honduras","Hungary","Iceland","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy","Japan","Jordan",
  "Kazakhstan","Kenya","Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon","Liberia","Libya","Lithuania","Luxembourg",
  "Madagascar","Malaysia","Maldives","Mali","Malta","Mexico","Moldova","Monaco","Mongolia","Morocco","Mozambique",
  "Myanmar","Namibia","Nepal","Netherlands","New Zealand","Nicaragua","Niger","Nigeria","Norway","Oman","Pakistan",
  "Panama","Paraguay","Peru","Philippines","Poland","Portugal","Qatar","Romania","Russia","Rwanda","Saudi Arabia",
  "Senegal","Serbia","Singapore","Slovakia","Slovenia","Somalia","South Africa","South Korea","Spain","Sri Lanka",
  "Sudan","Sweden","Switzerland","Syria","Taiwan","Tajikistan","Thailand","Turkey","Turkmenistan","Uganda",
  "Ukraine","United Arab Emirates","United Kingdom","United States","Uruguay","Uzbekistan","Venezuela","Vietnam",
  "Yemen","Zambia","Zimbabwe"];

  countries.forEach(c => signupCountry.insertAdjacentHTML("beforeend", `<option value="${c}">${c}</option>`));

  // گرفتن ref از لینک
  const params = new URLSearchParams(window.location.search);
  const refFromUrl = params.get("ref");
  if (refFromUrl) referralInput.value = refFromUrl;

  // toggle
  loginForm.style.display = "flex";
  signupForm.style.display = "none";

  btnLogin.onclick = () => {
    btnLogin.classList.add("active");
    btnSignUp.classList.remove("active");
    loginForm.style.display = "flex";
    signupForm.style.display = "none";
    msg.innerText="";
  };

  btnSignUp.onclick = () => {
    btnSignUp.classList.add("active");
    btnLogin.classList.remove("active");
    signupForm.style.display = "flex";
    loginForm.style.display = "none";
    msg.innerText="";
  };

  // LOGIN
  document.getElementById("loginSubmit").onclick = async () => {
    const { error } = await supabase.auth.signInWithPassword({
      email: loginEmail.value,
      password: loginPassword.value
    });
    if (error) { msg.innerText = error.message; return; }
    location.href="dashboard.html";
  };

// SIGNUP
document.getElementById("signupSubmit").onclick = async () => {

  msg.innerText="";
  msg.style.color="red";

  const email = signupEmail.value.trim();
  const password = signupPassword.value.trim();
  const firstName = signupFirstName.value.trim();
  const lastName = signupLastName.value.trim();
  const dob = signupDOB.value;
  const country = signupCountry.value;
  const referralCode = referralInput.value.trim();

  if(!email || !password || !firstName || !lastName || !dob || !country){
    msg.innerText="Please fill all required fields";
    return;
  }

  let validReferral = null;

  // چک کد ریفرال
  if (referralCode) {
    const { data: refUser } = await supabase
      .from("users")
      .select("referral_code")
      .eq("referral_code", referralCode)
      .single();

    if (!refUser) {
      msg.innerText="Invalid referral code";
      return;
    }

    validReferral = referralCode;
  }

  // ثبت در auth
  const { data, error } = await supabase.auth.signUp({ email, password });
  if (error) { msg.innerText=error.message; return; }

  const userIdAuth = data.user.id;

  // ✅ ساخت user_id هشت رقمی عددی
  let customUserId;
  let exists = true;

  while (exists) {
    customUserId = Math.floor(10000000 + Math.random() * 90000000).toString();

    const { data: checkUser } = await supabase
      .from("users")
      .select("user_id")
      .eq("user_id", customUserId)
      .single();

    if (!checkUser) exists = false;
  }

  // ساخت کد ریفرال برای خودش
  const myReferralCode = customUserId;

  // ثبت در جدول users
  await supabase.from("users").insert({
    id: userIdAuth,
    email,
    first_name: firstName,
    last_name: lastName,
    dob,
    country,
    user_id: customUserId,          // ✅ این همان ۸ رقمی است
    referral_code: myReferralCode,  // کد ریفرال خودش
    referral_id: validReferral
  });

  msg.style.color="green";
  msg.innerText="Registered successfully. Please login.";

  signupForm.style.display="none";
  loginForm.style.display="flex";
  btnLogin.classList.add("active");
  btnSignUp.classList.remove("active");
};

});
</script>

</body>
</html>
