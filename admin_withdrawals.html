<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw Requests | Admin</title>

<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{
  background:#1a1a2e;
  color:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header button{
  background:#e74c3c;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:#fff;
  cursor:pointer;
}
.container{padding:20px}
.request-card{
  background:#fff;
  border:1px solid #ccc;
  border-radius:10px;
  padding:15px;
  margin-bottom:15px;
  position:relative;
}
.status{
  position:absolute;
  top:10px;
  right:10px;
  padding:4px 8px;
  border-radius:4px;
  color:#fff;
  font-size:12px;
}
.status.pending{background:orange}
.status.approved{background:green}
.status.rejected{background:red}
button.action{
  margin-top:10px;
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
button.approve{background:#27ae60;color:#fff}
button.reject{background:#c0392b;color:#fff}
button:disabled{opacity:0.6;cursor:not-allowed}
</style>
</head>

<body>

<header>
  <h3>Withdraw Requests</h3>
  <button onclick="goBack()">Back</button>
</header>

<div class="container">
  <div id="requestList">Loading...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = "https://iecnioogmafgxwarmkxz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function goBack(){
  window.location.href="admin_dashboard.html";
}

async function loadRequests(){
  const { data, error } = await supabase
    .from('withdraw_requests')
    .select('*')
    .order('created_at',{ascending:false});

  const container = document.getElementById('requestList');
  container.innerHTML='';

  if(error || !data){
    container.innerHTML='Error loading requests';
    return;
  }

  if(data.length===0){
    container.innerHTML='No withdrawal requests';
    return;
  }

  data.forEach(row=>{
    const div=document.createElement('div');
    div.className='request-card';

    div.innerHTML=`
      <div class="status ${row.status}">${row.status.toUpperCase()}</div>
      <b>User:</b> ${row.user_id}<br>
      <b>Coin:</b> ${row.coin_symbol}<br>
      <b>Network:</b> ${row.network || '-'}<br>
      <b>Address:</b> ${row.address || '-'}<br>
      <b>Amount:</b> ${Number(row.amount).toFixed(8)}<br>
      <b>Date:</b> ${new Date(row.created_at).toLocaleString()}
    `;

    if(row.status==='pending'){
      const approveBtn=document.createElement('button');
      approveBtn.className='action approve';
      approveBtn.innerText='Approve';
      approveBtn.onclick=()=>approveWithdraw(row.id);

      const rejectBtn=document.createElement('button');
      rejectBtn.className='action reject';
      rejectBtn.innerText='Reject';
      rejectBtn.onclick=()=>rejectWithdraw(row.id);

      div.appendChild(approveBtn);
      div.appendChild(rejectBtn);
    }

    container.appendChild(div);
  });
}

window.approveWithdraw = async (id)=>{

  const { data:request } = await supabase
    .from('withdraw_requests')
    .select('*')
    .eq('id',id)
    .single();

  if(!request || request.status!=='pending'){
    alert("Already processed");
    return;
  }

  await supabase
    .from('withdraw_requests')
    .update({status:'approved'})
    .eq('id',id)
    .eq('status','pending'); // جلوگیری از دوبار کلیک

  const { data:wallet } = await supabase
    .from('wallets')
    .select('*')
    .eq('user_id',request.user_id)
    .eq('coin_symbol',request.coin_symbol)
    .single();

  if(wallet){
    const newLocked = Number(wallet.locked) - Number(request.amount);
    await supabase
      .from('wallets')
      .update({locked:newLocked<0?0:newLocked})
      .eq('id',wallet.id);
  }

  loadRequests();
}

window.rejectWithdraw = async (id)=>{

  const { data:request } = await supabase
    .from('withdraw_requests')
    .select('*')
    .eq('id',id)
    .single();

  if(!request || request.status!=='pending'){
    alert("Already processed");
    return;
  }

  await supabase
    .from('withdraw_requests')
    .update({status:'rejected'})
    .eq('id',id)
    .eq('status','pending');

  const { data:wallet } = await supabase
    .from('wallets')
    .select('*')
    .eq('user_id',request.user_id)
    .eq('coin_symbol',request.coin_symbol)
    .single();

  if(wallet){
    const newBalance = Number(wallet.balance)+Number(request.amount);
    const newLocked = Number(wallet.locked)-Number(request.amount);

    await supabase
      .from('wallets')
      .update({
        balance:newBalance,
        locked:newLocked<0?0:newLocked
      })
      .eq('id',wallet.id);
  }

  loadRequests();
}

loadRequests();

</script>
</body>
</html>
