<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Withdraw Requests</title>

<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8f9fa}
header{
  background:#1a1a2e;
  color:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header button{
  background:#e74c3c;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:#fff;
  cursor:pointer;
}
.container{padding:20px}
.history-item{
  background:#fff;
  border:1px solid #ccc;
  border-radius:10px;
  padding:15px;
  margin-bottom:15px;
  position:relative;
}
.status-badge{
  padding:3px 8px;
  border-radius:4px;
  color:#fff;
  font-size:12px;
  position:absolute;
  top:10px;
  right:10px;
}
.status-badge.pending{background:orange}
.status-badge.approved{background:green}
.status-badge.rejected{background:red}
button.action{
  margin-top:10px;
  padding:6px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
/* وضعیت‌ها */
.status-badge{
  padding:2px 6px;
  border-radius:4px;
  color:#fff;
  font-size:12px
}

.status-badge.pending{background:orange}
.status-badge.completed{background:green}

/* ✅ فقط این قسمت تغییر داده شده */
.status-badge.cancelled{
  background:#e74c3c;
  color:#fff;
  font-weight:600;
}

button.cancel{
  position:absolute;
  right:10px;
  top:10px;
  background:#e74c3c;
  color:#fff;
  border:none;
  padding:5px 10px;
  border-radius:4px;
  cursor:pointer
}
button.approve{background:#27ae60;color:#fff}
button.reject{background:#c0392b;color:#fff}
button:disabled{opacity:0.6;cursor:not-allowed}
</style>
</head>

<body>

<header>
  <h3>Withdraw Requests</h3>
  <button onclick="location.href='admin_dashboard.html'">Back</button>
</header>

<div class="container">
  <div id="historyList">Loading...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = "https://iecnioogmafgxwarmkxz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadWithdrawals(){

  const container = document.getElementById("historyList");
  container.innerHTML = "Loading...";

  const { data, error } = await client
    .from("withdraw_requests")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    container.innerHTML = "Error loading data";
    console.error(error);
    return;
  }

  if(!data || data.length===0){
    container.innerHTML = "No withdrawal requests";
    return;
  }

  container.innerHTML = "";

  data.forEach(row=>{

    const div = document.createElement("div");
    div.className = "history-item";

    const status = document.createElement("span");
    status.className = "status-badge " + row.status;
    status.innerText = row.status.toUpperCase();
    div.appendChild(status);

    div.innerHTML += `
      <b>User:</b> ${row.user_id}<br>
      <b>Coin:</b> ${row.coin_symbol}<br>
      <b>Network:</b> ${row.network || '-'}<br>
      <b>Address:</b> ${row.address || '-'}<br>
      <b>Amount:</b> ${Number(row.amount).toFixed(8)}<br>
      <b>Date:</b> ${new Date(row.created_at).toLocaleString()}
    `;

    if(row.status === "pending"){

      const approveBtn = document.createElement("button");
      approveBtn.className = "action approve";
      approveBtn.innerText = "Approve";
      approveBtn.onclick = ()=>approveWithdraw(row);

      const rejectBtn = document.createElement("button");
      rejectBtn.className = "action reject";
      rejectBtn.innerText = "Reject";
      rejectBtn.onclick = ()=>rejectWithdraw(row);

      div.appendChild(approveBtn);
      div.appendChild(rejectBtn);
    }

    container.appendChild(div);
  });
}

async function approveWithdraw(row){

  // جلوگیری از دوبار کلیک
  const { data:check } = await client
    .from("withdraw_requests")
    .select("status")
    .eq("id",row.id)
    .single();

  if(!check || check.status !== "pending"){
    alert("Already processed");
    return;
  }

  // تغییر وضعیت
  await client
    .from("withdraw_requests")
    .update({ status:"approved" })
    .eq("id",row.id)
    .eq("status","pending");

  // کم کردن locked
  const { data:wallet } = await client
    .from("wallets")
    .select("*")
    .eq("user_id",row.user_id)
    .eq("coin_symbol",row.coin_symbol)
    .single();

  if(wallet){
    const newLocked = Number(wallet.locked) - Number(row.amount);
    await client
      .from("wallets")
      .update({ locked: newLocked < 0 ? 0 : newLocked })
      .eq("id",wallet.id);
  }

  loadWithdrawals();
}

async function rejectWithdraw(row){

  const { data:check } = await client
    .from("withdraw_requests")
    .select("status")
    .eq("id",row.id)
    .single();

  if(!check || check.status !== "pending"){
    alert("Already processed");
    return;
  }

  await client
    .from("withdraw_requests")
    .update({ status:"rejected" })
    .eq("id",row.id)
    .eq("status","pending");

  const { data:wallet } = await client
    .from("wallets")
    .select("*")
    .eq("user_id",row.user_id)
    .eq("coin_symbol",row.coin_symbol)
    .single();

  if(wallet){
    const newBalance = Number(wallet.balance) + Number(row.amount);
    const newLocked = Number(wallet.locked) - Number(row.amount);

    await client
      .from("wallets")
      .update({
        balance:newBalance,
        locked:newLocked < 0 ? 0 : newLocked
      })
      .eq("id",wallet.id);
  }

  loadWithdrawals();
}

loadWithdrawals();

</script>
</body>
</html>
