<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Withdraw Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9}
header{background:#1a1a2e;color:#fff;padding:15px;text-align:center;font-size:18px}
.container{padding:20px}
.request-card{
  background:#fff;
  border-radius:10px;
  padding:15px;
  margin-bottom:15px;
  border:1px solid #ddd;
  position:relative
}
.status{
  padding:4px 8px;
  border-radius:5px;
  font-size:12px;
  color:#fff;
}
.pending{background:orange}
.completed{background:green}
.rejected{background:red}
.cancelled{background:#555}
.closed{background:black}

.actions button{
  margin-top:10px;
  margin-right:5px;
  padding:6px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  color:#fff
}
.btn-complete{background:green}
.btn-reject{background:red}
.btn-close{background:black}
button:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>

<body>

<header>Admin Withdraw Management</header>

<div class="container">
  <div id="withdrawList">Loading...</div>
</div>

<script>

const SUPABASE_URL = 'https://iecnioogmafgxwarmkxz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA'; 
// ⚠️ در صفحه ادمین بهتر است از service_role در سرور استفاده شود

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const withdrawList = document.getElementById("withdrawList");

async function loadWithdraws(){
  const { data, error } = await supabase
    .from("withdraw_requests")
    .select("*")
    .order("created_at",{ascending:false});

  if(error){
    withdrawList.innerHTML="Error loading requests";
    return;
  }

  if(!data || data.length===0){
    withdrawList.innerHTML="No withdrawal requests";
    return;
  }

  withdrawList.innerHTML="";

  data.forEach(row=>{
    const div = document.createElement("div");
    div.className="request-card";

    div.innerHTML = `
      <b>User:</b> ${row.user_id}<br>
      <b>Coin:</b> ${row.coin_symbol}<br>
      <b>Amount:</b> ${Number(row.amount).toFixed(8)}<br>
      <b>Network:</b> ${row.network || '-'}<br>
      <b>Address:</b> ${row.address || '-'}<br>
      <b>Date:</b> ${new Date(row.created_at).toLocaleString()}<br><br>
      <span class="status ${row.status}">${row.status.toUpperCase()}</span>
      <div class="actions"></div>
    `;

    const actions = div.querySelector(".actions");

    if(row.status === "pending"){
      const btnComplete = document.createElement("button");
      btnComplete.className="btn-complete";
      btnComplete.innerText="Approve";
      btnComplete.onclick=()=>updateStatus(row,"completed",btnComplete);

      const btnReject = document.createElement("button");
      btnReject.className="btn-reject";
      btnReject.innerText="Reject";
      btnReject.onclick=()=>updateStatus(row,"rejected",btnReject);

      const btnClose = document.createElement("button");
      btnClose.className="btn-close";
      btnClose.innerText="Close";
      btnClose.onclick=()=>updateStatus(row,"closed",btnClose);

      actions.appendChild(btnComplete);
      actions.appendChild(btnReject);
      actions.appendChild(btnClose);
    }

    withdrawList.appendChild(div);
  });
}

async function updateStatus(row,newStatus,btn){

  btn.disabled=true;

  const { error } = await supabase
    .from("withdraw_requests")
    .update({status:newStatus})
    .eq("id",row.id)
    .eq("status","pending"); // فقط اگر هنوز pending باشد

  if(error){
    alert("Error updating status");
    btn.disabled=false;
    return;
  }

  // اگر reject شد باید locked کم شود
  if(newStatus==="rejected"){
    const { data: wallet } = await supabase
      .from("wallets")
      .select("*")
      .eq("user_id",row.user_id)
      .eq("coin_symbol",row.coin_symbol)
      .single();

    if(wallet){
      await supabase.from("wallets")
        .update({
          balance: wallet.balance + Number(row.amount),
          locked: Math.max(0,wallet.locked - Number(row.amount))
        })
        .eq("id",wallet.id);
    }
  }

  loadWithdraws();
}

loadWithdraws();

</script>

</body>
</html>
