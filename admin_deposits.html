<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Withdraw Requests</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f6fa;}
header{
  background:#1a1a2e;
  color:#fff;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header button{
  background:#e74c3c;
  border:none;
  color:#fff;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}
.container{padding:30px;}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border:1px solid #ccc;text-align:center;}
th{background:#1a1a2e;color:#fff;}
button.action-btn{
  padding:6px 12px;
  margin:2px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
button.approve{background:#27ae60;color:#fff;}
button.reject{background:#c0392b;color:#fff;}
button.action-btn:hover{opacity:0.85;}
</style>
</head>

<body>

<header>
  <h2>Withdraw Requests</h2>
  <button onclick="goBack()">Back</button>
</header>

<div class="container">
  <table>
    <thead>
      <tr>
        <th>User ID</th>
        <th>Coin</th>
        <th>Network</th>
        <th>Address</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="withdrawBody"></tbody>
  </table>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = "https://iecnioogmafgxwarmkxz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

if (!localStorage.getItem('admin_logged_in')) {
  alert("Please login as admin");
  window.location.href = "admin.html";
}

function goBack(){
  window.location.href = "admin_dashboard.html";
}

async function loadWithdraws(){
  const { data, error } = await supabase
    .from('withdraw_requests')
    .select('*')
    .order('created_at', { ascending:false });

  if(error){
    console.error(error);
    return;
  }

  const body = document.getElementById('withdrawBody');
  body.innerHTML = '';

  data.forEach(row=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row.user_id}</td>
      <td>${row.coin_symbol}</td>
      <td>${row.network || '-'}</td>
      <td>${row.address || '-'}</td>
      <td>${Number(row.amount).toFixed(8)}</td>
      <td>${row.status || 'pending'}</td>
      <td>${new Date(row.created_at).toLocaleString()}</td>
      <td>
        <button class="action-btn approve" ${row.status !== 'pending' ? 'disabled' : ''}
          onclick="approveWithdraw('${row.id}')">Approve</button>
        <button class="action-btn reject" ${row.status !== 'pending' ? 'disabled' : ''}
          onclick="rejectWithdraw('${row.id}')">Reject</button>
      </td>
    `;
    body.appendChild(tr);
  });
}

window.approveWithdraw = async (requestId) => {

  const { data:request } = await supabase
    .from('withdraw_requests')
    .select('*')
    .eq('id', requestId)
    .single();

  if(!request || request.status !== 'pending'){
    alert("Already processed");
    return;
  }

  // 1️⃣ تغییر وضعیت
  await supabase
    .from('withdraw_requests')
    .update({ status:'approved' })
    .eq('id', requestId);

  // 2️⃣ کم کردن از locked
  const { data:wallet } = await supabase
    .from('wallets')
    .select('*')
    .eq('user_id', request.user_id)
    .eq('coin_symbol', request.coin_symbol)
    .single();

  if(wallet){
    const newLocked = Number(wallet.locked) - Number(request.amount);

    await supabase
      .from('wallets')
      .update({ locked: newLocked < 0 ? 0 : newLocked })
      .eq('id', wallet.id);
  }

  loadWithdraws();
};

window.rejectWithdraw = async (requestId) => {

  const { data:request } = await supabase
    .from('withdraw_requests')
    .select('*')
    .eq('id', requestId)
    .single();

  if(!request || request.status !== 'pending'){
    alert("Already processed");
    return;
  }

  // 1️⃣ تغییر وضعیت
  await supabase
    .from('withdraw_requests')
    .update({ status:'rejected' })
    .eq('id', requestId);

  // 2️⃣ برگرداندن پول به balance
  const { data:wallet } = await supabase
    .from('wallets')
    .select('*')
    .eq('user_id', request.user_id)
    .eq('coin_symbol', request.coin_symbol)
    .single();

  if(wallet){
    const newBalance = Number(wallet.balance) + Number(request.amount);
    const newLocked = Number(wallet.locked) - Number(request.amount);

    await supabase
      .from('wallets')
      .update({
        balance: newBalance,
        locked: newLocked < 0 ? 0 : newLocked
      })
      .eq('id', wallet.id);
  }

  loadWithdraws();
};

window.onload = loadWithdraws;
</script>

</body>
</html>
