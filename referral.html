<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referral Dashboard</title>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = "https://iecnioogmafgxwarmkxz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25pb29nbWFmZ3h3YXJta3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTYwNDgsImV4cCI6MjA4MzM3MjA0OH0.3zkHQpwdYUVdf6_GkPfkLRu7xgWMaUHNuFmYMBgBsJA";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

window.logout = async () => {
  await supabase.auth.signOut();
  window.location.href = "login.html";
};

window.togglePanel = () => {
  document.getElementById('sidePanel').classList.toggle('active');
};

async function loadReferral() {

  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    window.location.href = "login.html";
    return;
  }

  const userId = session.user.id;

  // گرفتن کد ریفرال خود کاربر
  const { data: user, error } = await supabase
    .from("users")
    .select("referral_code")
    .eq("id", userId)
    .single();

  if (error || !user) {
    document.getElementById("referralCode").innerText = "Error";
    return;
  }

  const referralCode = user.referral_code;

  // 🔹 نام ربات خودت را اینجا بگذار
  const botUsername = "@novabit_exchange_bot";
  const referralLink = `https://t.me/${botUsername}?start=${referralCode}`;

  // نمایش کد
  document.getElementById("referralCode").value = referralCode;

  // نمایش لینک
  document.getElementById("referralLink").value = referralLink;

  // گرفتن لیست کاربران دعوت شده
  const { data: invitedUsers } = await supabase
    .from("users")
    .select("first_name,last_name,email")
    .eq("referral_id", referralCode)
    .order("created_at", { ascending: false });

  document.getElementById("totalInvited").innerText = invitedUsers?.length || 0;

  const tbody = document.getElementById("invitedList");
  tbody.innerHTML = "";

  if (!invitedUsers || invitedUsers.length === 0) {
    tbody.innerHTML = `<tr><td colspan="3">No invited users yet</td></tr>`;
  } else {
    invitedUsers.forEach(u => {
      tbody.innerHTML += `
        <tr>
          <td>${u.first_name || "-"}</td>
          <td>${u.last_name || "-"}</td>
          <td>${u.email}</td>
        </tr>
      `;
    });
  }
}

window.copyCode = () => {
  const input = document.getElementById("referralCode");
  input.select();
  document.execCommand("copy");
  alert("Referral Code Copied ✅");
};

window.copyLink = () => {
  const input = document.getElementById("referralLink");
  input.select();
  document.execCommand("copy");
  alert("Referral Link Copied ✅");
};

window.addEventListener("DOMContentLoaded", loadReferral);

</script>

<style>
body{
  margin:0;
  font-family:Arial,Roboto,sans-serif;
  background:#f4f6fa;
}
header{
  background:#1a1a2e;
  color:#fff;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header button{
  background:#4b49ac;
  border:none;
  color:#fff;
  padding:8px 14px;
  border-radius:5px;
  cursor:pointer;
}
#sidePanel{
  position:fixed;
  top:0;
  right:-350px;
  width:300px;
  height:100%;
  background:#fff;
  box-shadow:-3px 0 10px rgba(0,0,0,.2);
  padding:20px;
  transition:right 0.3s;
}
#sidePanel.active{right:0;}
#sidePanel a{
  display:block;
  margin:10px 0;
  text-decoration:none;
  color:#1a1a2e;
}
.logoutBtn{
  width:100%;
  margin-top:20px;
  padding:10px;
  background:#e74c3c;
  border:none;
  color:#fff;
  border-radius:5px;
}
.card{
  background:#fff;
  padding:20px;
  margin:20px auto;
  max-width:700px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
}
input{
  width:75%;
  padding:8px;
  margin-top:5px;
}
button.copyBtn{
  padding:8px 12px;
  background:#4b49ac;
  color:#fff;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin-left:10px;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}
th,td{
  padding:10px;
  border-bottom:1px solid #ddd;
}
th{
  background:#f0f0f0;
}
</style>
</head>

<body>

<header>
  <h2>Referral Dashboard</h2>
  <button onclick="togglePanel()">Menu</button>
</header>

<div id="sidePanel">
  <button onclick="togglePanel()">Close</button>
  <a href="dashboard.html">Dashboard</a>
  <a href="profile.html">Profile</a>
  <a href="referral.html">Referral</a>
  <button class="logoutBtn" onclick="logout()">Logout</button>
</div>

<div class="card">
  <h3>Your Referral Code</h3>
  <input type="text" id="referralCode" readonly>
  <button class="copyBtn" onclick="copyCode()">Copy Code</button>

  <h3 style="margin-top:25px;">Your Telegram Referral Link</h3>
  <input type="text" id="referralLink" readonly>
  <button class="copyBtn" onclick="copyLink()">Copy Link</button>
</div>

<div class="card">
  <h3>Total Invited Users: <span id="totalInvited">0</span></h3>
  <table>
    <thead>
      <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
      </tr>
    </thead>
    <tbody id="invitedList">
      <tr><td colspan="3">Loading...</td></tr>
    </tbody>
  </table>
</div>

</body>
</html>
